# Cybersecurity Governor — network chaos harness (Toxiproxy).
#
# Usage:
#   docker compose -f docker-compose.chaos.yml up -d --wait cg-postgres-chaos cg-toxiproxy
#   docker compose -f docker-compose.chaos.yml run --rm cg-toxiproxy-config
#   CG_CHAOS_POSTGRES_URL=postgresql+psycopg://postgres:postgres@localhost:5446/cg_chaos \
#     TOXIPROXY_API=http://localhost:8475 \
#     pytest tests/chaos/ -v
#
# Toxiproxy API: http://localhost:8475 (distinct from Finance Ops :8474)

services:
  cg-postgres-chaos:
    image: postgres:16
    environment:
      POSTGRES_DB: cg_chaos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5445:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cg_chaos"]
      interval: 2s
      timeout: 5s
      retries: 15
    tmpfs:
      - /var/lib/postgresql/data

  cg-toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    ports:
      - "8475:8474"
      - "5446:5446"
    command: ["-host", "0.0.0.0"]
    depends_on:
      cg-postgres-chaos:
        condition: service_healthy

  cg-toxiproxy-config:
    image: curlimages/curl:8.5.0
    depends_on:
      - cg-toxiproxy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until curl -sf http://cg-toxiproxy:8474/version; do sleep 1; done
        curl -sf -X POST http://cg-toxiproxy:8474/proxies \
          -d '{"name":"cg-postgres","listen":"0.0.0.0:5446","upstream":"cg-postgres-chaos:5432"}'
        echo "cg toxiproxy postgres proxy ready on :5446"
