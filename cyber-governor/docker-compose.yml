# Cybersecurity Governor — spine stack
# Build context: repository root (parent of cyber-governor/)

x-cg-health: &cg-health
  interval: 5s
  timeout: 5s
  retries: 12
  start_period: 40s

services:
  cg-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cybersecuritygovernor}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5443:5432"
    volumes:
      - cg_postgres_data:/var/lib/postgresql/data
      - ./migrations/0001_cg_spine_init.sql:/docker-entrypoint-initdb.d/0001_init.sql:ro
      - ./migrations/0002_security_anchors_lineage.sql:/docker-entrypoint-initdb.d/0002_init.sql:ro
      - ./migrations/0003_invariant_constraints.sql:/docker-entrypoint-initdb.d/0003_init.sql:ro
      - ./migrations/0004_admin_audit_log.sql:/docker-entrypoint-initdb.d/0004_init.sql:ro
      - ./migrations/0005_posture_content_platforms.sql:/docker-entrypoint-initdb.d/0005_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cybersecuritygovernor"]
      interval: 5s
      timeout: 5s
      retries: 5

  cg-redis:
    image: redis:7
    ports:
      - "6390:6379"

  cg-sidecar:
    build:
      context: ..
      dockerfile: cyber-governor/spine/sidecar/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@cg-postgres:5432/cybersecuritygovernor
      REDIS_URL: redis://cg-redis:6379/0
      CG_INTERNAL_TOKENS: ${CG_INTERNAL_TOKENS:-dev-cg-spine-token-change-me}
    ports:
      - "8101:8101"
    depends_on:
      cg-postgres:
        condition: service_healthy
      cg-redis:
        condition: service_started
    healthcheck:
      <<: *cg-health
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8101/readyz', timeout=2)\"",
        ]

  cg-reconciler:
    build:
      context: ..
      dockerfile: cyber-governor/spine/reconciler/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@cg-postgres:5432/cybersecuritygovernor
      REDIS_URL: redis://cg-redis:6379/0
      RECONCILER_HEALTH_PORT: 8102
    ports:
      - "8102:8102"
    depends_on:
      cg-postgres:
        condition: service_healthy
      cg-sidecar:
        condition: service_started

  cg-gateway:
    build:
      context: ..
      dockerfile: cyber-governor/spine/gateway/Dockerfile
    environment:
      CG_SIDECAR_URL: http://cg-sidecar:8101
      CG_INTERNAL_TOKEN: ${CG_INTERNAL_TOKENS:-dev-cg-spine-token-change-me}
    ports:
      - "8100:8100"
    depends_on:
      cg-sidecar:
        condition: service_healthy
    healthcheck:
      <<: *cg-health
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/healthz', timeout=2)\"",
        ]

  cg-identity-gate:
    build:
      context: ..
      dockerfile: cyber-governor/platforms/identity_gate/Dockerfile
    environment:
      CG_SPINE_ENABLED: ${CG_SPINE_ENABLED:-true}
      CG_SIDECAR_URL: http://cg-sidecar:8101
      CG_INTERNAL_TOKEN: ${CG_INTERNAL_TOKENS:-dev-cg-spine-token-change-me}
    ports:
      - "8103:8103"
    depends_on:
      cg-sidecar:
        condition: service_healthy
    healthcheck:
      <<: *cg-health
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8103/healthz', timeout=2)\"",
        ]

  cg-egress-lock:
    build:
      context: ..
      dockerfile: cyber-governor/platforms/egress_lock/Dockerfile
    environment:
      CG_SPINE_ENABLED: ${CG_SPINE_ENABLED:-true}
      CG_SIDECAR_URL: http://cg-sidecar:8101
      CG_INTERNAL_TOKEN: ${CG_INTERNAL_TOKENS:-dev-cg-spine-token-change-me}
    ports:
      - "8104:8104"
    depends_on:
      cg-sidecar:
        condition: service_healthy
    healthcheck:
      <<: *cg-health
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8104/healthz', timeout=2)\"",
        ]

  cg-witness-bridge:
    build:
      context: ..
      dockerfile: cyber-governor/platforms/witness_bridge/Dockerfile
    environment:
      CG_SPINE_ENABLED: ${CG_SPINE_ENABLED:-true}
      CG_SIDECAR_URL: http://cg-sidecar:8101
      CG_INTERNAL_TOKEN: ${CG_INTERNAL_TOKENS:-dev-cg-spine-token-change-me}
    ports:
      - "8105:8105"
    depends_on:
      cg-sidecar:
        condition: service_healthy
    healthcheck:
      <<: *cg-health
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8105/healthz', timeout=2)\"",
        ]

  cg-lineage-ingest:
    build:
      context: ..
      dockerfile: cyber-governor/platforms/lineage_ingest/Dockerfile
    environment:
      CG_SPINE_ENABLED: ${CG_SPINE_ENABLED:-true}
      CG_SIDECAR_URL: http://cg-sidecar:8101
      CG_INTERNAL_TOKEN: ${CG_INTERNAL_TOKENS:-dev-cg-spine-token-change-me}
    ports:
      - "8106:8106"
    depends_on:
      cg-sidecar:
        condition: service_healthy
    healthcheck:
      <<: *cg-health
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8106/healthz', timeout=2)\"",
        ]

  cg-posture-reconcile:
    build:
      context: ..
      dockerfile: cyber-governor/platforms/posture_reconcile/Dockerfile
    environment:
      CG_SPINE_ENABLED: ${CG_SPINE_ENABLED:-true}
      CG_SIDECAR_URL: http://cg-sidecar:8101
      CG_INTERNAL_TOKEN: ${CG_INTERNAL_TOKENS:-dev-cg-spine-token-change-me}
    ports:
      - "8107:8107"
    depends_on:
      cg-sidecar:
        condition: service_healthy
    healthcheck:
      <<: *cg-health
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8107/healthz', timeout=2)\"",
        ]

  cg-content-guard:
    build:
      context: ..
      dockerfile: cyber-governor/platforms/content_guard/Dockerfile
    environment:
      CG_SPINE_ENABLED: ${CG_SPINE_ENABLED:-true}
      CG_SIDECAR_URL: http://cg-sidecar:8101
      CG_INTERNAL_TOKEN: ${CG_INTERNAL_TOKENS:-dev-cg-spine-token-change-me}
    ports:
      - "8108:8108"
    depends_on:
      cg-sidecar:
        condition: service_healthy
    healthcheck:
      <<: *cg-health
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8108/healthz', timeout=2)\"",
        ]

volumes:
  cg_postgres_data:
