apiVersion: v1
kind: ConfigMap
metadata:
  name: cg-pgbouncer-config
  namespace: cybersecuritygovernor
data:
  pgbouncer.ini: |
    [databases]
    cybersecuritygovernor = host=cg-postgres port=5432 dbname=cybersecuritygovernor

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 6432
    auth_type = plain
    auth_file = /etc/pgbouncer/userlist.txt
    pool_mode = transaction
    max_client_conn = 500
    default_pool_size = 20
    min_pool_size = 5
    reserve_pool_size = 5
    server_reset_query = DISCARD ALL
    ignore_startup_parameters = extra_float_digits
    admin_users = postgres
  userlist.txt: |
    "postgres" "postgres"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cg-pgbouncer
  namespace: cybersecuritygovernor
  labels:
    app: cg-pgbouncer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cg-pgbouncer
  template:
    metadata:
      labels:
        app: cg-pgbouncer
    spec:
      containers:
        - name: pgbouncer
          image: edoburu/pgbouncer:1.22.1-p0
          ports:
            - containerPort: 6432
          volumeMounts:
            - name: config
              mountPath: /etc/pgbouncer/pgbouncer.ini
              subPath: pgbouncer.ini
            - name: config
              mountPath: /etc/pgbouncer/userlist.txt
              subPath: userlist.txt
          readinessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: cg-pgbouncer-config

---
apiVersion: v1
kind: Service
metadata:
  name: cg-pgbouncer
  namespace: cybersecuritygovernor
spec:
  selector:
    app: cg-pgbouncer
  ports:
    - name: pgbouncer
      port: 6432
      targetPort: 6432
