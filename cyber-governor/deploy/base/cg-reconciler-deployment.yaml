apiVersion: apps/v1
kind: Deployment
metadata:
  name: cg-reconciler
  namespace: cybersecuritygovernor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cg-reconciler
  template:
    metadata:
      labels:
        app: cg-reconciler
    spec:
      containers:
        - name: cg-reconciler
          image: cybersecuritygovernor/reconciler:latest
          ports:
            - containerPort: 8102
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cybersecuritygovernor-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: cybersecuritygovernor-secrets
                  key: redis-url
            - name: RECONCILER_HEALTH_PORT
              value: "8102"
