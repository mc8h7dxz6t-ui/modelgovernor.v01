apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cg-sidecar-pdb
  namespace: cybersecuritygovernor
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: cg-sidecar
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cg-sidecar-hpa
  namespace: cybersecuritygovernor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cg-sidecar
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
