apiVersion: apps/v1
kind: Deployment
metadata:
  name: cg-identity-gate
  namespace: cybersecuritygovernor
  labels:
    app: cg-identity-gate
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cg-identity-gate
  template:
    metadata:
      labels:
        app: cg-identity-gate
        cybersecuritygovernor.io/spine-client: "true"
        cybersecuritygovernor.io/role: platform
    spec:
      containers:
        - name: cg-identity-gate
          image: cybersecuritygovernor/identity-gate:latest
          ports:
            - containerPort: 8103
          env:
            - name: CG_SPINE_ENABLED
              value: "true"
            - name: CG_SIDECAR_URL
              value: "http://cg-sidecar:8101"
            - name: CG_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cybersecuritygovernor-secrets
                  key: cg-internal-tokens
---
apiVersion: v1
kind: Service
metadata:
  name: cg-identity-gate
  namespace: cybersecuritygovernor
spec:
  selector:
    app: cg-identity-gate
  ports:
    - port: 8103
      targetPort: 8103
---
