apiVersion: apps/v1
kind: Deployment
metadata:
  name: cg-sidecar
  namespace: cybersecuritygovernor
  labels:
    app: cg-sidecar
    app.kubernetes.io/component: policy-sidecar
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: cg-sidecar
  template:
    metadata:
      labels:
        app: cg-sidecar
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: cg-sidecar
          image: cybersecuritygovernor/sidecar:latest
          ports:
            - name: http
              containerPort: 8101
          envFrom:
            - configMapRef:
                name: cybersecuritygovernor-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cybersecuritygovernor-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: cybersecuritygovernor-secrets
                  key: redis-url
            - name: CG_INTERNAL_TOKENS
              valueFrom:
                secretKeyRef:
                  name: cybersecuritygovernor-secrets
                  key: cg-internal-tokens
            - name: SECURITY_ANCHOR_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: cybersecuritygovernor-secrets
                  key: security-anchor-s3-bucket
                  optional: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cg-sidecar
  namespace: cybersecuritygovernor
spec:
  selector:
    app: cg-sidecar
  ports:
    - name: http
      port: 8101
      targetPort: http
