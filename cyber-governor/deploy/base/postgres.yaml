apiVersion: apps/v1
kind: Deployment
metadata:
  name: cg-postgres
  namespace: cybersecuritygovernor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cg-postgres
  template:
    metadata:
      labels:
        app: cg-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: cybersecuritygovernor
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cybersecuritygovernor-secrets
                  key: postgres-password
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: cg-postgres
  namespace: cybersecuritygovernor
spec:
  selector:
    app: cg-postgres
  ports:
    - port: 5432
