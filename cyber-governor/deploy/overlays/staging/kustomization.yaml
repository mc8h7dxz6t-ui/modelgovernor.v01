apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - externalsecret.yaml

patches:
  - target:
      kind: Secret
      name: cybersecuritygovernor-secrets
    patch: |-
      $patch: delete
      apiVersion: v1
      kind: Secret
      metadata:
        name: cybersecuritygovernor-secrets
        namespace: cybersecuritygovernor
  - target:
      kind: Deployment
      name: cg-sidecar
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
