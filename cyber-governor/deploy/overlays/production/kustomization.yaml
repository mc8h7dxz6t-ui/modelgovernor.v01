apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../enterprise
  - externalsecret.yaml
  - redis-sentinel.yaml

patches:
  - path: pgbouncer-secret-patch.yaml
  - target:
      kind: Secret
      name: cybersecuritygovernor-secrets
    patch: |-
      $patch: delete
      apiVersion: v1
      kind: Secret
      metadata:
        name: cybersecuritygovernor-secrets
        namespace: cybersecuritygovernor
  - target:
      kind: Deployment
      name: cg-sidecar
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: ConfigMap
      name: cybersecuritygovernor-config
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: cybersecuritygovernor-config
        namespace: cybersecuritygovernor
      data:
        OIDC_ENABLED: "true"
        GATEWAY_OIDC_ENABLED: "true"
        SECURITY_ANCHOR_S3_OBJECT_LOCK_ENABLED: "true"
        REDIS_SENTINEL_MASTER_NAME: "mymaster"
  - target:
      kind: Deployment
      name: cg-redis
    patch: |-
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: cg-redis
        namespace: cybersecuritygovernor
  - target:
      kind: Service
      name: cg-redis
    patch: |-
      $patch: delete
      apiVersion: v1
      kind: Service
      metadata:
        name: cg-redis
        namespace: cybersecuritygovernor
  - target:
      kind: Deployment
      name: cg-gateway
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: cg-gateway
        namespace: cybersecuritygovernor
      spec:
        template:
          spec:
            containers:
              - name: cg-gateway
                env:
                  - name: OIDC_ENABLED
                    value: "true"
                  - name: OIDC_ISSUER_URL
                    valueFrom:
                      secretKeyRef:
                        name: cybersecuritygovernor-secrets
                        key: oidc-issuer-url
                  - name: OIDC_AUDIENCE
                    valueFrom:
                      secretKeyRef:
                        name: cybersecuritygovernor-secrets
                        key: oidc-audience
  - target:
      kind: Deployment
      name: cg-sidecar
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: cg-sidecar
        namespace: cybersecuritygovernor
      spec:
        template:
          spec:
            containers:
              - name: cg-sidecar
                env:
                  - name: OIDC_ENABLED
                    value: "true"
                  - name: OIDC_ISSUER_URL
                    valueFrom:
                      secretKeyRef:
                        name: cybersecuritygovernor-secrets
                        key: oidc-issuer-url
                  - name: OIDC_AUDIENCE
                    valueFrom:
                      secretKeyRef:
                        name: cybersecuritygovernor-secrets
                        key: oidc-audience
                  - name: REDIS_URL
                    value: redis+sentinel://cg-redis-sentinel:26379/mymaster/0
  - target:
      kind: Deployment
      name: cg-reconciler
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: cg-reconciler
        namespace: cybersecuritygovernor
      spec:
        template:
          spec:
            containers:
              - name: cg-reconciler
                env:
                  - name: REDIS_URL
                    value: redis+sentinel://cg-redis-sentinel:26379/mymaster/0
