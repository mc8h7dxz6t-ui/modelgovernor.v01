apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cybersecuritygovernor-secrets
  namespace: cybersecuritygovernor
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: cybersecuritygovernor-secrets
    creationPolicy: Owner
  data:
    - secretKey: database-url
      remoteRef:
        key: cybersecuritygovernor/database-url
    - secretKey: database-url-direct
      remoteRef:
        key: cybersecuritygovernor/database-url-direct
    - secretKey: redis-url
      remoteRef:
        key: cybersecuritygovernor/redis-url
    - secretKey: cg-internal-tokens
      remoteRef:
        key: cybersecuritygovernor/cg-internal-tokens
    - secretKey: security-anchor-s3-bucket
      remoteRef:
        key: cybersecuritygovernor/security-anchor-s3-bucket
    - secretKey: oidc-issuer-url
      remoteRef:
        key: cybersecuritygovernor/oidc-issuer-url
    - secretKey: oidc-audience
      remoteRef:
        key: cybersecuritygovernor/oidc-audience
