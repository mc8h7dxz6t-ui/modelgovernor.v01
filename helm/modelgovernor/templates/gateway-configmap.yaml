apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "modelgovernor.fullname" . }}-gateway-config
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "modelgovernor.labels" . | nindent 4 }}
    app: gateway
data:
  config.yaml: |
    model_list:
    {{- range .Values.gateway.config.models }}
      - model_name: {{ .name }}
        litellm_params:
          model: {{ .provider }}/{{ .name }}
          api_key: os.environ/OPENAI_API_KEY
    {{- end }}
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
