{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "modelgovernor.fullname" . }}-sidecar
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "modelgovernor.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "modelgovernor.selectorLabels" . | nindent 6 }}
      app: sidecar
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "modelgovernor.selectorLabels" . | nindent 14 }}
              app: gateway
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: {{ .Values.sidecar.port }}
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 443
    - to:
        - podSelector:
            matchLabels:
              {{- include "modelgovernor.selectorLabels" . | nindent 14 }}
              app: redis
      ports:
        - protocol: TCP
          port: {{ .Values.redis.port }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "modelgovernor.fullname" . }}-reconciler
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "modelgovernor.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "modelgovernor.selectorLabels" . | nindent 6 }}
      app: reconciler
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: {{ .Values.reconciler.port }}
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "modelgovernor.fullname" . }}-gateway
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "modelgovernor.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "modelgovernor.selectorLabels" . | nindent 6 }}
      app: gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: {{ .Values.gateway.port }}
  egress:
    - to:
        - podSelector:
            matchLabels:
              {{- include "modelgovernor.selectorLabels" . | nindent 14 }}
              app: sidecar
      ports:
        - protocol: TCP
          port: {{ .Values.sidecar.port }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
{{- if .Values.redis.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "modelgovernor.fullname" . }}-redis
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "modelgovernor.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "modelgovernor.selectorLabels" . | nindent 6 }}
      app: redis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "modelgovernor.selectorLabels" . | nindent 14 }}
              app: sidecar
        - podSelector:
            matchLabels:
              {{- include "modelgovernor.selectorLabels" . | nindent 14 }}
              app: reconciler
      ports:
        - protocol: TCP
          port: {{ .Values.redis.port }}
  egress: []
{{- end }}
{{- end }}
