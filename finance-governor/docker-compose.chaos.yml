# Finance Governor — Toxiproxy chaos harness
services:
  fg-postgres-chaos:
    image: postgres:16
    environment:
      POSTGRES_DB: fg_chaos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fg_chaos"]
      interval: 2s
      timeout: 5s
      retries: 15
    tmpfs:
      - /var/lib/postgresql/data

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    ports:
      - "8475:8474"
      - "5437:5437"
    command: ["-host", "0.0.0.0"]
    depends_on:
      fg-postgres-chaos:
        condition: service_healthy

  toxiproxy-config:
    image: curlimages/curl:8.5.0
    depends_on:
      - toxiproxy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until curl -sf http://toxiproxy:8474/version; do sleep 1; done
        curl -sf -X POST http://toxiproxy:8474/proxies -d '{"name":"fg-postgres","listen":"0.0.0.0:5437","upstream":"fg-postgres-chaos:5432"}'
        echo "fg toxiproxy ready on :5437"
