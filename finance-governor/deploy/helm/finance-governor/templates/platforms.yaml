{{- if and .Values.platforms.enabled .Values.platforms.wirematch.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fg-wirematch
  namespace: {{ include "fg.namespace" . }}
  labels:
    {{- include "fg.labels" . | nindent 4 }}
    app.kubernetes.io/component: wirematch
spec:
  replicas: {{ .Values.platforms.wirematch.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: wirematch
  template:
    metadata:
      labels:
        app.kubernetes.io/component: wirematch
        {{- include "fg.labels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "{{ .Values.platforms.wirematch.port }}"
    spec:
      {{- include "fg.podAntiAffinity" . | nindent 6 }}
      containers:
        - name: wirematch
          image: {{ .Values.image.wirematch }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.platforms.wirematch.port }}
          env:
            {{- include "fg.platformEnv" . | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.platforms.wirematch.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.platforms.wirematch.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: fg-wirematch
  namespace: {{ include "fg.namespace" . }}
  labels:
    {{- include "fg.labels" . | nindent 4 }}
    app.kubernetes.io/component: wirematch
spec:
  selector:
    app.kubernetes.io/component: wirematch
  ports:
    - port: {{ .Values.platforms.wirematch.port }}
      targetPort: {{ .Values.platforms.wirematch.port }}
{{- end }}
