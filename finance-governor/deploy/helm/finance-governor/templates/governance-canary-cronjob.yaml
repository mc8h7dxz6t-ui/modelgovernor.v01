{{- if .Values.governanceCanary.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: fg-governance-canary
  namespace: {{ include "fg.namespace" . }}
spec:
  schedule: {{ .Values.governanceCanary.schedule | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: canary
              image: curlimages/curl:8.5.0
              env:
                - name: FG_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: fg-internal
                      key: fg-internal-tokens
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  curl -sf -H "x-internal-token: ${FG_TOKEN}" http://fg-sidecar:8091/readyz
                  curl -sf -H "x-internal-token: ${FG_TOKEN}" \
                    http://fg-sidecar:8091/internal/diagnostic/status
                  curl -sf -H "x-internal-token: ${FG_TOKEN}" \
                    http://fg-sidecar:8091/internal/decisions/verify-chain
                  echo "fg governance canary ok"
{{- end }}
