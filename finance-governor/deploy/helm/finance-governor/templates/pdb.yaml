{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fg-sidecar-pdb
  namespace: {{ include "fg.namespace" . }}
  labels:
    {{- include "fg.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.sidecar.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/component: sidecar
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fg-gateway-pdb
  namespace: {{ include "fg.namespace" . }}
  labels:
    {{- include "fg.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.gateway.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/component: gateway
{{- end }}
