apiVersion: apps/v1
kind: Deployment
metadata:
  name: fg-gateway
  namespace: {{ include "fg.namespace" . }}
  labels:
    {{- include "fg.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.replicas.gateway }}
  selector:
    matchLabels:
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/component: gateway
        {{- include "fg.labels" . | nindent 8 }}
    spec:
      containers:
        - name: gateway
          image: {{ .Values.image.gateway }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8090
          envFrom:
            - configMapRef:
                name: {{ include "fg.configMapName" . }}
          env:
            - name: FG_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "fg.secretName" . }}
                  key: fg-internal-tokens
            - name: OIDC_ISSUER_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "fg.secretName" . }}
                  key: oidc-issuer-url
                  optional: true
            - name: OIDC_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: {{ include "fg.secretName" . }}
                  key: oidc-audience
                  optional: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8090
