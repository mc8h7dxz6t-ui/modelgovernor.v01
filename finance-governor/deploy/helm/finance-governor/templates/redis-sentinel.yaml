{{- if .Values.redis.sentinel.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: fg-redis-sentinel-config
  namespace: {{ include "fg.namespace" . }}
  labels:
    {{- include "fg.labels" . | nindent 4 }}
data:
  sentinel.conf: |
    port 26379
    dir /tmp
    sentinel monitor mymaster fg-redis-master 6379 2
    sentinel down-after-milliseconds mymaster 5000
    sentinel failover-timeout mymaster 60000
    sentinel parallel-syncs mymaster 1
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fg-redis-master
  namespace: {{ include "fg.namespace" . }}
  labels:
    {{- include "fg.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis-master
spec:
  serviceName: fg-redis-master
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: redis-master
  template:
    metadata:
      labels:
        app.kubernetes.io/component: redis-master
        {{- include "fg.labels" . | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          args: ["redis-server", "--appendonly", "yes"]
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fg-redis-master
  namespace: {{ include "fg.namespace" . }}
  labels:
    {{- include "fg.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis-master
spec:
  selector:
    app.kubernetes.io/component: redis-master
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fg-redis-replica
  namespace: {{ include "fg.namespace" . }}
  labels:
    {{- include "fg.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis-replica
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: redis-replica
  template:
    metadata:
      labels:
        app.kubernetes.io/component: redis-replica
        {{- include "fg.labels" . | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-master
          image: redis:7-alpine
          command: ["/bin/sh", "-c", "until redis-cli -h fg-redis-master ping; do sleep 1; done"]
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["/bin/sh", "-c", "redis-server --replicaof fg-redis-master 6379 --appendonly yes"]
          ports:
            - containerPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fg-redis-sentinel
  namespace: {{ include "fg.namespace" . }}
  labels:
    {{- include "fg.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis-sentinel
spec:
  replicas: {{ .Values.redis.sentinel.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: redis-sentinel
  template:
    metadata:
      labels:
        app.kubernetes.io/component: redis-sentinel
        {{- include "fg.labels" . | nindent 8 }}
    spec:
      containers:
        - name: sentinel
          image: redis:7-alpine
          command: ["redis-sentinel", "/etc/redis/sentinel.conf"]
          ports:
            - containerPort: 26379
          volumeMounts:
            - name: sentinel-config
              mountPath: /etc/redis
          readinessProbe:
            exec:
              command: ["redis-cli", "-p", "26379", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: sentinel-config
          configMap:
            name: fg-redis-sentinel-config
---
apiVersion: v1
kind: Service
metadata:
  name: fg-redis-sentinel
  namespace: {{ include "fg.namespace" . }}
  labels:
    {{- include "fg.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis-sentinel
spec:
  selector:
    app.kubernetes.io/component: redis-sentinel
  ports:
    - port: 26379
      targetPort: 26379
{{- end }}
