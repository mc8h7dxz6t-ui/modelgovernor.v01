{{- if .Values.pgbouncer.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: fg-pgbouncer-config
  namespace: {{ include "fg.namespace" . }}
  labels:
    {{- include "fg.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgbouncer
data:
  pgbouncer.ini: |
    [databases]
    {{ .Values.postgres.database }} = host=fg-postgres port=5432 dbname={{ .Values.postgres.database }}

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 6432
    auth_type = plain
    auth_file = /etc/pgbouncer/userlist.txt
    pool_mode = transaction
    max_client_conn = {{ .Values.pgbouncer.maxClientConn }}
    default_pool_size = {{ .Values.pgbouncer.defaultPoolSize }}
    min_pool_size = 5
    reserve_pool_size = 5
    server_reset_query = DISCARD ALL
    ignore_startup_parameters = extra_float_digits
  userlist.txt: |
    "{{ .Values.postgres.user }}" "{{ .Values.postgres.password }}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fg-pgbouncer
  namespace: {{ include "fg.namespace" . }}
  labels:
    {{- include "fg.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgbouncer
spec:
  replicas: {{ .Values.pgbouncer.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: pgbouncer
  template:
    metadata:
      labels:
        app.kubernetes.io/component: pgbouncer
        {{- include "fg.labels" . | nindent 8 }}
    spec:
      {{- include "fg.podAntiAffinity" . | nindent 6 }}
      containers:
        - name: pgbouncer
          image: edoburu/pgbouncer:1.22.1-p0
          ports:
            - containerPort: 6432
          volumeMounts:
            - name: config
              mountPath: /etc/pgbouncer/pgbouncer.ini
              subPath: pgbouncer.ini
            - name: config
              mountPath: /etc/pgbouncer/userlist.txt
              subPath: userlist.txt
          readinessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: fg-pgbouncer-config
---
apiVersion: v1
kind: Service
metadata:
  name: fg-pgbouncer
  namespace: {{ include "fg.namespace" . }}
  labels:
    {{- include "fg.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgbouncer
spec:
  selector:
    app.kubernetes.io/component: pgbouncer
  ports:
    - name: pgbouncer
      port: 6432
      targetPort: 6432
{{- end }}
