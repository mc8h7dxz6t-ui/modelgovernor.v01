{{- $railLive := eq (.Values.platforms.creditgovern.rail.mode | default "auto") "live" -}}
{{- if and .Values.platforms.enabled .Values.platforms.creditgovern.enabled (or .Values.creditRail.enabled $railLive) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fg-credit-rail
  namespace: {{ include "fg.namespace" . }}
  labels:
    {{- include "fg.labels" . | nindent 4 }}
    app.kubernetes.io/component: credit-rail
spec:
  replicas: {{ .Values.creditRail.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: credit-rail
  template:
    metadata:
      labels:
        app.kubernetes.io/component: credit-rail
        {{- include "fg.labels" . | nindent 8 }}
      annotations:
        {{- include "fg.istioPodAnnotations" . | nindent 8 }}
    spec:
      {{- include "fg.podAntiAffinity" . | nindent 6 }}
      containers:
        - name: credit-rail
          image: {{ .Values.image.creditgovern }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uvicorn", "platforms.credit_govern.rail_server:app", "--host", "0.0.0.0", "--port", "{{ .Values.creditRail.port }}"]
          ports:
            - containerPort: {{ .Values.creditRail.port }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.creditRail.port }}
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.creditRail.port }}
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fg-credit-rail
  namespace: {{ include "fg.namespace" . }}
  labels:
    {{- include "fg.labels" . | nindent 4 }}
    app.kubernetes.io/component: credit-rail
spec:
  selector:
    app.kubernetes.io/component: credit-rail
  ports:
    - port: {{ .Values.creditRail.port }}
      targetPort: {{ .Values.creditRail.port }}
{{- end }}
