{{- if .Values.enterprise.networkPolicy }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fg-sidecar-ingress
  namespace: {{ include "fg.namespace" . }}
  labels:
    {{- include "fg.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: sidecar
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: finance-governor
      ports:
        - protocol: TCP
          port: 8091
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fg-platform-egress
  namespace: {{ include "fg.namespace" . }}
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values: [wirematch, algofreeze, subledger, assetledger, creditgovern, gateway]
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: sidecar
      ports:
        - protocol: TCP
          port: 8091
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: pgbouncer
      ports:
        - protocol: TCP
          port: 6432
    - ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
{{- end }}
