{{- if .Values.prometheusRules.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: fg-prometheus-slo
  namespace: {{ include "fg.namespace" . }}
  labels:
    {{- include "fg.labels" . | nindent 4 }}
    release: prometheus
spec:
  groups:
    - name: finance-governor-slo
      rules:
        - alert: FgReserveAvailabilityLow
          expr: |
            (
              sum(rate(fg_invariant_events_total{event="crystallize_success_total"}[5m]))
              /
              (
                sum(rate(fg_invariant_events_total{event="crystallize_success_total"}[5m]))
                + sum(rate(fg_invariant_events_total{event="surprise_commit_blocked_total"}[5m]))
                + 1e-9
              )
            ) < 0.995
          for: 10m
          labels:
            severity: critical
            service: finance-governor
          annotations:
            summary: "Finance Governor reserve availability below 99.5% SLO"
            description: "Crystallize success ratio dropped below 99.5% over 10 minutes."

        - alert: FgReserveAvailabilityFastBurn
          expr: |
            (
              1 - (
                sum(rate(fg_invariant_events_total{event="crystallize_success_total"}[1h]))
                /
                (
                  sum(rate(fg_invariant_events_total{event="crystallize_success_total"}[1h]))
                  + sum(rate(fg_invariant_events_total{event="surprise_commit_blocked_total"}[1h]))
                  + 1e-9
                )
              )
            ) > (14.4 * 0.005)
          for: 5m
          labels:
            severity: critical
            service: finance-governor
          annotations:
            summary: "Finance Governor fast SLO burn"
            description: "Reserve availability error budget burning >14.4x in 1h."

        - alert: FgReserveAvailabilitySlowBurn
          expr: |
            (
              1 - (
                sum(rate(fg_invariant_events_total{event="crystallize_success_total"}[6h]))
                /
                (
                  sum(rate(fg_invariant_events_total{event="crystallize_success_total"}[6h]))
                  + sum(rate(fg_invariant_events_total{event="surprise_commit_blocked_total"}[6h]))
                  + 1e-9
                )
              )
            ) > (3 * 0.005)
          for: 30m
          labels:
            severity: warning
            service: finance-governor
          annotations:
            summary: "Finance Governor slow SLO burn"
            description: "Reserve availability error budget burning >3x over 6h."

        - alert: FgDecisionChainVerificationFailed
          expr: increase(fg_invariant_events_total{event="ledger_chain_verification_failed_total"}[15m]) > 0
          for: 5m
          labels:
            severity: critical
            service: finance-governor
          annotations:
            summary: "Decision chain verification failed"
            description: "Hash chain integrity check failed — halt writes and run forensic export."

        - alert: FgDriftLockoutSpike
          expr: increase(fg_invariant_events_total{event="drift_enforced_total"}[1h]) > 5
          for: 15m
          labels:
            severity: warning
            service: finance-governor
          annotations:
            summary: "Exposure drift lockouts elevated"
            description: "More than 5 drift-enforced account lockouts in the past hour."

        - alert: FgDiagnosticModeActive
          expr: increase(fg_invariant_events_total{event="regulatory_audit_diagnostic_entered_total"}[5m]) > 0
          for: 1m
          labels:
            severity: warning
            service: finance-governor
          annotations:
            summary: "Finance Governor diagnostic mode entered"
            description: "Invariant violation triggered diagnostic write halt."
{{- end }}
