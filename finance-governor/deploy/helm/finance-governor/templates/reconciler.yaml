apiVersion: apps/v1
kind: Deployment
metadata:
  name: fg-reconciler
  namespace: {{ include "fg.namespace" . }}
  labels:
    {{- include "fg.labels" . | nindent 4 }}
    app.kubernetes.io/component: reconciler
spec:
  replicas: {{ .Values.replicas.reconciler }}
  selector:
    matchLabels:
      app.kubernetes.io/component: reconciler
  template:
    metadata:
      labels:
        app.kubernetes.io/component: reconciler
        {{- include "fg.labels" . | nindent 8 }}
    spec:
      containers:
        - name: reconciler
          image: {{ .Values.image.reconciler }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8092
          env:
            - name: DATABASE_URL
              value: postgresql+psycopg://postgres:postgres@fg-postgres:5432/financegovernor
            - name: RECONCILER_HEALTH_PORT
              value: "8092"
