apiVersion: apps/v1
kind: Deployment
metadata:
  name: fg-reconciler
  namespace: {{ include "fg.namespace" . }}
  labels:
    {{- include "fg.labels" . | nindent 4 }}
    app.kubernetes.io/component: reconciler
spec:
  replicas: {{ .Values.replicas.reconciler }}
  selector:
    matchLabels:
      app.kubernetes.io/component: reconciler
  template:
    metadata:
      labels:
        app.kubernetes.io/component: reconciler
        {{- include "fg.labels" . | nindent 8 }}
      annotations:
        {{- include "fg.istioPodAnnotations" . | nindent 8 }}
    spec:
      {{- include "fg.podAntiAffinity" . | nindent 6 }}
      containers:
        - name: reconciler
          image: {{ .Values.image.reconciler }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8092
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fg.secretName" . }}
                  key: postgres-password
            - name: DATABASE_URL
              value: postgresql+psycopg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@{{ include "fg.databaseHost" . }}:{{ include "fg.databasePort" . }}/{{ .Values.postgres.database }}
            - name: REDIS_URL
              value: {{ include "fg.redisUrl" . | quote }}
            - name: RECONCILER_HEALTH_PORT
              value: "8092"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8092
            initialDelaySeconds: 8
