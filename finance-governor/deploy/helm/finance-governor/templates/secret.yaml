{{- if and .Values.secrets.create (not .Values.externalSecrets.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fg.secretName" . }}
  namespace: {{ include "fg.namespace" . }}
  labels:
    {{- include "fg.labels" . | nindent 4 }}
type: Opaque
stringData:
  fg-internal-tokens: {{ .Values.secrets.internalToken | quote }}
  postgres-password: {{ .Values.postgres.password | quote }}
  oidc-issuer-url: {{ .Values.oidc.issuerUrl | quote }}
  oidc-audience: {{ .Values.oidc.audience | quote }}
  decision-anchor-s3-bucket: {{ .Values.s3Anchor.bucket | quote }}
{{- end }}
