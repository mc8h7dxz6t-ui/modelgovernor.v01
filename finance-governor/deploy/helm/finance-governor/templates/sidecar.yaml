apiVersion: apps/v1
kind: Deployment
metadata:
  name: fg-sidecar
  namespace: {{ include "fg.namespace" . }}
  labels:
    {{- include "fg.labels" . | nindent 4 }}
    app.kubernetes.io/component: sidecar
spec:
  replicas: {{ .Values.replicas.sidecar }}
  selector:
    matchLabels:
      app.kubernetes.io/component: sidecar
  template:
    metadata:
      labels:
        app.kubernetes.io/component: sidecar
        {{- include "fg.labels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics/prometheus"
        prometheus.io/port: "8091"
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- include "fg.podAntiAffinity" . | nindent 6 }}
      containers:
        - name: sidecar
          image: {{ .Values.image.sidecar }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8091
          envFrom:
            - configMapRef:
                name: {{ include "fg.configMapName" . }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fg.secretName" . }}
                  key: postgres-password
            - name: DATABASE_URL
              value: postgresql+psycopg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@{{ include "fg.databaseHost" . }}:{{ include "fg.databasePort" . }}/{{ .Values.postgres.database }}
            - name: REDIS_URL
              value: {{ include "fg.redisUrl" . | quote }}
            - name: FG_INTERNAL_TOKENS
              valueFrom:
                secretKeyRef:
                  name: {{ include "fg.secretName" . }}
                  key: fg-internal-tokens
            - name: OIDC_ISSUER_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "fg.secretName" . }}
                  key: oidc-issuer-url
                  optional: true
            - name: OIDC_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: {{ include "fg.secretName" . }}
                  key: oidc-audience
                  optional: true
            - name: DECISION_ANCHOR_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: {{ include "fg.secretName" . }}
                  key: decision-anchor-s3-bucket
                  optional: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8091
            initialDelaySeconds: 8
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8091
            initialDelaySeconds: 10
            periodSeconds: 20
