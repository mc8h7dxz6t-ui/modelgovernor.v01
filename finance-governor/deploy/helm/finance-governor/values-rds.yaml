# AWS RDS production overlay — managed Postgres (no in-cluster StatefulSet)
# Usage:
#   helm upgrade --install fg ./deploy/helm/finance-governor \
#     -f values-production.yaml -f values-enterprise.yaml -f values-rds.yaml \
#     --set postgres.external.host=fg-prod.cluster-xxxx.us-east-1.rds.amazonaws.com

postgres:
  enabled: false
  external:
    enabled: true
    host: fg-prod.cluster-xxxx.us-east-1.rds.amazonaws.com
    port: 5432
    sslMode: require
    rds:
      enabled: true
      iamAuth: false

pgbouncer:
  enabled: true
  replicas: 3
