# AWS RDS production overlay — managed Postgres with read replica routing
postgres:
  enabled: false
  external:
    enabled: true
    host: fg-prod.cluster-xxxx.us-east-1.rds.amazonaws.com
    port: 5432
    sslMode: require
    readReplica:
      enabled: true
      host: fg-prod.cluster-ro-xxxx.us-east-1.rds.amazonaws.com
      port: 5432
    rds:
      enabled: true
      iamAuth: false

pgbouncer:
  enabled: true
  replicas: 3

secrets:
  databaseReadUrl: postgresql+psycopg://postgres:CHANGE_ME@pgbouncer-read:6432/financegovernor
