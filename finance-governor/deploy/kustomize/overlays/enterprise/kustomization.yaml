apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: finance-governor

resources:
  - ../../base
  - istio-egress.yaml
  - peer-authentication.yaml

commonLabels:
  environment: enterprise

patches:
  - target:
      kind: Namespace
      name: finance-governor
    patch: |-
      - op: add
        path: /metadata/labels/istio-injection
        value: enabled

# Workloads: helm install with values-enterprise.yaml
