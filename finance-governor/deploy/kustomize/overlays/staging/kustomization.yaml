apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: finance-governor-staging

patches:
  - target:
      kind: Namespace
      name: finance-governor
    patch: |-
      - op: replace
        path: /metadata/name
        value: finance-governor-staging
      - op: replace
        path: /metadata/labels/environment
        value: staging

# Full workload manifests: helm install -f deploy/helm/finance-governor/values-production.yaml
