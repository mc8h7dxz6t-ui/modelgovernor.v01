# Finance Governor — Toxiproxy chaos harness (Tier 4)
#
# Usage:
#   docker compose -f docker-compose.fg-chaos.yml up -d --wait fg-postgres-chaos toxiproxy
#   docker compose -f docker-compose.fg-chaos.yml run --rm fg-toxiproxy-config
#   FG_POSTGRES_TEST_URL=postgresql+psycopg://postgres:postgres@localhost:5437/fg_chaos \
#     pytest finance-governor/tests/chaos/ -v

services:
  fg-postgres-chaos:
    image: postgres:16
    environment:
      POSTGRES_DB: fg_chaos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fg_chaos"]
      interval: 2s
      timeout: 5s
      retries: 15
    tmpfs:
      - /var/lib/postgresql/data
    volumes:
      - ./migrations/0001_fg_spine_init.sql:/docker-entrypoint-initdb.d/0001_init.sql:ro
      - ./migrations/0002_fg_ledger_chain_anchors.sql:/docker-entrypoint-initdb.d/0002_anchors.sql:ro

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    ports:
      - "8475:8474"
      - "5437:5437"
    command: ["-host", "0.0.0.0"]
    depends_on:
      fg-postgres-chaos:
        condition: service_healthy

  fg-toxiproxy-config:
    image: curlimages/curl:8.5.0
    depends_on:
      - toxiproxy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until curl -sf http://toxiproxy:8474/version; do sleep 1; done
        curl -sf -X DELETE http://toxiproxy:8474/proxies/postgres || true
        curl -sf -X POST http://toxiproxy:8474/proxies \
          -d '{"name":"postgres","listen":"0.0.0.0:5437","upstream":"fg-postgres-chaos:5432"}'
        echo "fg toxiproxy postgres proxy ready on :5437"
