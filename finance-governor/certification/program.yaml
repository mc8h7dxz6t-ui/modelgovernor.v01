# Finance Governor External Certification Program (FG-ECP)
# Third-party and partner platforms submit attestation reports against this manifest.

program:
  id: fg-ecp-v1
  name: Finance Governor External Certification Program
  issuer: Finance Governor / ModelGovernor institutional++ lineage
  version: "1.0.0"

levels:
  L1:
    title: Platform Ready
    requirements:
      - standalone_health_endpoints
      - tier1_unit_tests
      - facet_schema_declared
  L2:
    title: Institutional
    extends: L1
    requirements:
      - diagnostic_mode_compatible
      - invariant_counters
      - idempotent_mutations
  L3:
    title: Institutional++
    extends: L2
    requirements:
      - spine_adapter_integration
      - postgres_integration_tests
      - platform_registry_row
      - fg_platform_conformance
  L4:
    title: Gold Enterprise
    extends: L3
    requirements:
      - fg_certification_l4
      - helm_enterprise_render
      - chaos_toxiproxy
      - gitops_manifests
  L5:
    title: Institutional Self-Check Certified
    extends: L4
    requirements:
      - live_inference_rail_or_equivalent
      - managed_postgres_rds_overlay
      - istio_strict_mtls_all_workloads
      - external_attestation_report
      - examiner_evidence_pack

evidence_artifacts:
  - path: finance-governor/docs/platform-sdk.md
    id: platform_sdk_doc
  - path: finance-governor/certification/partner-checklist.md
    id: partner_checklist
  - path: finance-governor/scripts/fg_certification_report.py
    id: attestation_generator

submission:
  report_format: json
  report_schema_version: "1"
  required_fields:
    - program_id
    - level_claimed
    - platform_name
    - git_commit
    - generated_at
    - checks
    - report_sha256
  contact: certification@finance-governor.example
