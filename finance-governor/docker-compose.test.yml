# Postgres for Finance Governor integration tests (standalone — not ModelGovernor)

services:
  fg-test-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fg_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fg_test"]
      interval: 3s
      timeout: 3s
      retries: 10
