services:
  credit-rail:
    build:
      context: .
      dockerfile: finance-governor/platforms/credit_govern/Dockerfile
    command: ["uvicorn", "platforms.credit_govern.rail_server:app", "--host", "0.0.0.0", "--port", "8098"]
    ports:
      - "8098:8098"
  creditgovern:
    build:
      context: .
      dockerfile: finance-governor/platforms/credit_govern/Dockerfile
    environment:
      FG_SPINE_ENABLED: "false"
      FG_CREDIT_RAIL_MODE: live
      FG_CREDIT_RAIL_URL: http://credit-rail:8098
    ports:
      - "8097:8097"
    depends_on:
      - credit-rail
