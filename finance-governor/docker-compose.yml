# Finance Governor — spine stack (local)
# Ports offset from ModelGovernor so both can run together.

services:
  fg-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financegovernor}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - fg_postgres_data:/var/lib/postgresql/data
      - ./migrations/0001_fg_spine_init.sql:/docker-entrypoint-initdb.d/0001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financegovernor"]
      interval: 5s
      timeout: 5s
      retries: 5

  fg-redis:
    image: redis:7
    ports:
      - "6380:6379"

