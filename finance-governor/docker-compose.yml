# Finance Governor — spine stack (Phase 2)
# Build context: repository root (parent of finance-governor/)

services:
  fg-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financegovernor}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - fg_postgres_data:/var/lib/postgresql/data
      - ./migrations/0001_fg_spine_init.sql:/docker-entrypoint-initdb.d/0001_init.sql:ro
      - ./migrations/0002_fg_hardening.sql:/docker-entrypoint-initdb.d/0002_hardening.sql:ro
      - ./migrations/0003_platform_persistence.sql:/docker-entrypoint-initdb.d/0003_platform.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financegovernor"]
      interval: 5s
      timeout: 5s
      retries: 5

  fg-redis:
    image: redis:7
    ports:
      - "6380:6379"

  fg-sidecar:
    build:
      context: ..
      dockerfile: finance-governor/spine/sidecar/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@fg-postgres:5432/financegovernor
      REDIS_URL: redis://fg-redis:6379/0
      FG_INTERNAL_TOKENS: ${FG_INTERNAL_TOKENS:-dev-fg-spine-token-change-me}
    ports:
      - "8091:8091"
    depends_on:
      fg-postgres:
        condition: service_healthy
      fg-redis:
        condition: service_started

  fg-reconciler:
    build:
      context: ..
      dockerfile: finance-governor/spine/reconciler/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@fg-postgres:5432/financegovernor
      REDIS_URL: redis://fg-redis:6379/0
      RECONCILER_HEALTH_PORT: 8092
    ports:
      - "8092:8092"
    depends_on:
      fg-postgres:
        condition: service_healthy
      fg-sidecar:
        condition: service_started

  fg-gateway:
    build:
      context: ..
      dockerfile: finance-governor/spine/gateway/Dockerfile
    environment:
      FG_SIDECAR_URL: http://fg-sidecar:8091
      FG_INTERNAL_TOKEN: ${FG_INTERNAL_TOKENS:-dev-fg-spine-token-change-me}
    ports:
      - "8090:8090"
    depends_on:
      - fg-sidecar

  fg-wirematch:
    build:
      context: ..
      dockerfile: finance-governor/platforms/wire_match/Dockerfile
    environment:
      FG_SPINE_ENABLED: ${FG_SPINE_ENABLED:-true}
      FG_SIDECAR_URL: http://fg-sidecar:8091
      FG_INTERNAL_TOKEN: ${FG_INTERNAL_TOKENS:-dev-fg-spine-token-change-me}
      DATABASE_URL: postgresql+psycopg://postgres:postgres@fg-postgres:5432/financegovernor
    ports:
      - "8093:8093"
    depends_on:
      fg-sidecar:
        condition: service_started

  fg-algofreeze:
    build:
      context: ..
      dockerfile: finance-governor/platforms/algofreeze/Dockerfile
    environment:
      FG_SPINE_ENABLED: ${FG_SPINE_ENABLED:-true}
      FG_SIDECAR_URL: http://fg-sidecar:8091
      FG_INTERNAL_TOKEN: ${FG_INTERNAL_TOKENS:-dev-fg-spine-token-change-me}
      DATABASE_URL: postgresql+psycopg://postgres:postgres@fg-postgres:5432/financegovernor
    ports:
      - "8094:8094"
    depends_on:
      fg-sidecar:
        condition: service_started

  fg-subledger:
    build:
      context: ..
      dockerfile: finance-governor/platforms/subledger_sync/Dockerfile
    environment:
      FG_SPINE_ENABLED: ${FG_SPINE_ENABLED:-true}
      FG_SIDECAR_URL: http://fg-sidecar:8091
      FG_INTERNAL_TOKEN: ${FG_INTERNAL_TOKENS:-dev-fg-spine-token-change-me}
      DATABASE_URL: postgresql+psycopg://postgres:postgres@fg-postgres:5432/financegovernor
    ports:
      - "8095:8095"
    depends_on:
      fg-sidecar:
        condition: service_started

  fg-assetledger:
    build:
      context: ..
      dockerfile: finance-governor/platforms/asset_ledger/Dockerfile
    environment:
      FG_SPINE_ENABLED: ${FG_SPINE_ENABLED:-true}
      FG_SIDECAR_URL: http://fg-sidecar:8091
      FG_INTERNAL_TOKEN: ${FG_INTERNAL_TOKENS:-dev-fg-spine-token-change-me}
      DATABASE_URL: postgresql+psycopg://postgres:postgres@fg-postgres:5432/financegovernor
    ports:
      - "8096:8096"
    depends_on:
      fg-sidecar:
        condition: service_started

  fg-creditgovern:
    build:
      context: ..
      dockerfile: finance-governor/platforms/credit_govern/Dockerfile
    environment:
      FG_SPINE_ENABLED: ${FG_SPINE_ENABLED:-true}
      FG_SIDECAR_URL: http://fg-sidecar:8091
      FG_INTERNAL_TOKEN: ${FG_INTERNAL_TOKENS:-dev-fg-spine-token-change-me}
      DATABASE_URL: postgresql+psycopg://postgres:postgres@fg-postgres:5432/financegovernor
    ports:
      - "8097:8097"
    depends_on:
      fg-sidecar:
        condition: service_started

volumes:
  fg_postgres_data:
