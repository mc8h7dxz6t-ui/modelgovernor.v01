services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-modelgovernor}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  sidecar:
    build:
      context: ./sidecar
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SIDECAR_INTERNAL_TOKENS: ${SIDECAR_INTERNAL_TOKENS}
      DEFAULT_TRACE_CAP_AMOUNT: ${DEFAULT_TRACE_CAP_AMOUNT:-25.000000}
      DRIFT_ABSOLUTE_TOLERANCE: ${DRIFT_ABSOLUTE_TOLERANCE:-0.500000}
      DRIFT_RATIO_TOLERANCE: ${DRIFT_RATIO_TOLERANCE:-0.050000}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-2}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-5}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
      ORCHESTRATION_RUNTIME_MODE: ${ORCHESTRATION_RUNTIME_MODE:-coexisting}
      ORCHESTRATION_SHADOW_MODE: ${ORCHESTRATION_SHADOW_MODE:-true}
      ORCHESTRATION_CACHE_TTL_SECONDS: ${ORCHESTRATION_CACHE_TTL_SECONDS:-900}
    depends_on:
      - postgres
      - redis
    ports:
      - "8081:8081"

  reconciler:
    build:
      context: ./reconciler
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-2}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-1}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-5}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
    depends_on:
      - postgres
    ports:
      - "8082:8082"

volumes:
  postgres_data:
