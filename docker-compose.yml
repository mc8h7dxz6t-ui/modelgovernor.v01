services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-modelgovernor}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  sidecar:
    build:
      context: .
      dockerfile: sidecar/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SIDECAR_INTERNAL_TOKENS: ${SIDECAR_INTERNAL_TOKENS}
      DEFAULT_TRACE_CAP_AMOUNT: ${DEFAULT_TRACE_CAP_AMOUNT:-25.000000}
      DRIFT_ABSOLUTE_TOLERANCE: ${DRIFT_ABSOLUTE_TOLERANCE:-0.500000}
      DRIFT_RATIO_TOLERANCE: ${DRIFT_RATIO_TOLERANCE:-0.050000}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-2}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-5}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
    depends_on:
      - postgres
      - redis
    ports:
      - "8081:8081"

  reconciler:
    build:
      context: .
      dockerfile: reconciler/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-2}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-1}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-5}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
    depends_on:
      - postgres
    ports:
      - "8082:8082"

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      SIDECAR_INTERNAL_TOKEN: ${SIDECAR_PRIMARY_TOKEN:-dev-token}
      SIDECAR_URL: http://sidecar:8081
      MOCK_DISPATCH_COST: ${MOCK_DISPATCH_COST:-1.000000}
    depends_on:
      - sidecar
    ports:
      - "8080:8080"

volumes:
  postgres_data:
