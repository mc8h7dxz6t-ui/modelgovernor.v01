apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Production image tags are set at deploy time by the promotion workflow
# using `kustomize edit set image`.
images:
  - name: modelgovernor/sidecar
    newTag: latest
  - name: modelgovernor/reconciler
    newTag: latest

patches:
  # Scale the sidecar to at least 3 replicas for HA in production.
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: sidecar
  # Production resource profile: more CPU budget, tighter memory ceiling.
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
    target:
      kind: Deployment
      name: sidecar

commonLabels:
  environment: production
