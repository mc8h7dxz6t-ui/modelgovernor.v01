apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: modelgovernor-secrets
  namespace: modelgovernor
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: modelgovernor-secrets
    creationPolicy: Owner
  data:
    - secretKey: database-url
      remoteRef:
        key: modelgovernor/database-url
    - secretKey: database-url-direct
      remoteRef:
        key: modelgovernor/database-url-direct
    - secretKey: redis-url
      remoteRef:
        key: modelgovernor/redis-url
    - secretKey: sidecar-internal-tokens
      remoteRef:
        key: modelgovernor/sidecar-internal-tokens
    - secretKey: postgres-password
      remoteRef:
        key: modelgovernor/postgres-password
    - secretKey: openai-api-key
      remoteRef:
        key: modelgovernor/openai-api-key
    - secretKey: anthropic-api-key
      remoteRef:
        key: modelgovernor/anthropic-api-key
    - secretKey: pgbouncer-userlist
      remoteRef:
        key: modelgovernor/pgbouncer-userlist
    - secretKey: oidc-issuer-url
      remoteRef:
        key: modelgovernor/oidc-issuer-url
    - secretKey: oidc-audience
      remoteRef:
        key: modelgovernor/oidc-audience
    - secretKey: ledger-anchor-s3-bucket
      remoteRef:
        key: modelgovernor/ledger-anchor-s3-bucket
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: modelgovernor-pgbouncer-auth
  namespace: modelgovernor
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: modelgovernor-pgbouncer-auth
    creationPolicy: Owner
  data:
    - secretKey: userlist.txt
      remoteRef:
        key: modelgovernor/pgbouncer-userlist
