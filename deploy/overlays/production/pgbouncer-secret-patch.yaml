apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: modelgovernor
spec:
  template:
    spec:
      containers:
        - name: pgbouncer
          volumeMounts:
            - name: config
              mountPath: /etc/pgbouncer/pgbouncer.ini
              subPath: pgbouncer.ini
            - name: pgbouncer-auth
              mountPath: /etc/pgbouncer/userlist.txt
              subPath: userlist.txt
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: pgbouncer-config
        - name: pgbouncer-auth
          secret:
            secretName: modelgovernor-pgbouncer-auth
