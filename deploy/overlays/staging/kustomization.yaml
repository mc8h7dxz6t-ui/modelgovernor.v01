apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Staging-specific image tags are set at deploy time by the promotion workflow
# using `kustomize edit set image`.  The placeholder tag ensures a valid
# manifest is renderable without running the promotion pipeline.
images:
  - name: modelgovernor/sidecar
    newTag: latest
  - name: modelgovernor/reconciler
    newTag: latest

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: sidecar
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"
    target:
      kind: Deployment
      name: sidecar

labels:
  - includeSelectors: true
    pairs:
      environment: staging
