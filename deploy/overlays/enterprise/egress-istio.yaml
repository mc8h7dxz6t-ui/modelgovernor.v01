# Istio egress allowlist scaffold — enable with `kubectl apply -k deploy/overlays/enterprise`
# Requires Istio service mesh in the cluster.
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: llm-provider-egress
  namespace: modelgovernor
spec:
  hosts:
    - api.openai.com
    - api.anthropic.com
  location: MESH_EXTERNAL
  ports:
    - number: 443
      name: https
      protocol: HTTPS
  resolution: DNS
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: llm-provider-tls
  namespace: modelgovernor
spec:
  host: "*.openai.com"
  trafficPolicy:
    tls:
      mode: SIMPLE
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: gateway-egress-allowlist
  namespace: modelgovernor
spec:
  selector:
    matchLabels:
      app: gateway
  action: ALLOW
  rules:
    - to:
        - operation:
            hosts:
              - api.openai.com
              - api.anthropic.com
              - sidecar.modelgovernor.svc.cluster.local
