{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cybersecuritygovernor.secretName" . }}
  namespace: {{ include "cybersecuritygovernor.namespace" . }}
  labels:
    {{- include "cybersecuritygovernor.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  database-url: {{ .Values.secrets.databaseUrl | quote }}
  database-url-direct: {{ .Values.secrets.databaseUrlDirect | quote }}
  {{- if .Values.secrets.databaseReadUrl }}
  database-read-url: {{ .Values.secrets.databaseReadUrl | quote }}
  {{- end }}
  postgres-password: {{ .Values.secrets.postgresPassword | quote }}
  redis-url: {{ .Values.secrets.redisUrl | quote }}
  sidecar-internal-tokens: {{ .Values.secrets.sidecarInternalTokens | quote }}
  {{- if .Values.secrets.securityAnchorS3Bucket }}
  security-anchor-s3-bucket: {{ .Values.secrets.securityAnchorS3Bucket | quote }}
  {{- end }}
{{- end }}
