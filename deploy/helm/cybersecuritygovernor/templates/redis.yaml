{{- if and .Values.redis.enabled (not .Values.redis.sentinel.enabled) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: {{ include "cybersecuritygovernor.namespace" . }}
  labels:
    app: redis
    {{- include "cybersecuritygovernor.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: {{ .Values.redis.replicas }}
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: redis
          image: {{ .Values.images.redis.repository }}:{{ .Values.images.redis.tag }}
          imagePullPolicy: {{ .Values.images.redis.pullPolicy }}
          ports:
            - containerPort: 6379
          args: ["redis-server", "--save", "", "--appendonly", "no"]
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ include "cybersecuritygovernor.namespace" . }}
  labels:
    app: redis
    {{- include "cybersecuritygovernor.labels" . | nindent 4 }}
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
{{- end }}
