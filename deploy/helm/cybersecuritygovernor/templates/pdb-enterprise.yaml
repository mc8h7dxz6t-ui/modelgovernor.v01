{{- if .Values.reconciler.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: reconciler-pdb
  namespace: {{ include "cybersecuritygovernor.namespace" . }}
  labels:
    {{- include "cybersecuritygovernor.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.reconciler.pdb.minAvailable }}
  selector:
    matchLabels:
      app: reconciler
{{- end }}
---
{{- if .Values.pgbouncer.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pgbouncer-pdb
  namespace: {{ include "cybersecuritygovernor.namespace" . }}
  labels:
    {{- include "cybersecuritygovernor.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pgbouncer.pdb.minAvailable }}
  selector:
    matchLabels:
      app: pgbouncer
{{- end }}
---
{{- if and .Values.gateway.enabled .Values.gateway.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gateway-pdb
  namespace: {{ include "cybersecuritygovernor.namespace" . }}
  labels:
    {{- include "cybersecuritygovernor.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.gateway.pdb.minAvailable }}
  selector:
    matchLabels:
      app: gateway
{{- end }}
