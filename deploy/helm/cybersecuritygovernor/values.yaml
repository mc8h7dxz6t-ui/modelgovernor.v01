# Default values — use values-production.yaml or values-staging.yaml for overlays.

global:
  namespace: cybersecuritygovernor
  labels:
    app.kubernetes.io/part-of: cybersecuritygovernor
    app.kubernetes.io/managed-by: helm

nameOverride: ""
fullnameOverride: ""

images:
  sidecar:
    repository: cybersecuritygovernor/sidecar
    tag: latest
    pullPolicy: IfNotPresent
  reconciler:
    repository: cybersecuritygovernor/reconciler
    tag: latest
    pullPolicy: IfNotPresent
  gateway:
    repository: cybersecuritygovernor/gateway
    tag: latest
    pullPolicy: IfNotPresent
  egressGovern:
    repository: cybersecuritygovernor/egress-govern
    tag: latest
    pullPolicy: IfNotPresent
  identityGovern:
    repository: cybersecuritygovernor/identity-govern
    tag: latest
    pullPolicy: IfNotPresent
  threatProxy:
    repository: cybersecuritygovernor/threat-proxy
    tag: latest
    pullPolicy: IfNotPresent
  incidentResponseGate:
    repository: cybersecuritygovernor/incident-response-gate
    tag: latest
    pullPolicy: IfNotPresent
  postureReconcile:
    repository: cybersecuritygovernor/posture-reconcile
    tag: latest
    pullPolicy: IfNotPresent
  complianceLogger:
    repository: cybersecuritygovernor/compliance-logger
    tag: latest
    pullPolicy: IfNotPresent
  witnessBridge:
    repository: cybersecuritygovernor/witness-bridge
    tag: latest
    pullPolicy: IfNotPresent
  lineageIngest:
    repository: cybersecuritygovernor/lineage-ingest
    tag: latest
    pullPolicy: IfNotPresent
  contentGuard:
    repository: cybersecuritygovernor/content-guard
    tag: latest
    pullPolicy: IfNotPresent
  postgres:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  redis:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  pgbouncer:
    repository: edoburu/pgbouncer
    tag: 1.22.1-p0
    pullPolicy: IfNotPresent
  otelCollector:
    repository: otel/opentelemetry-collector
    tag: "0.103.0"
    pullPolicy: IfNotPresent
  migrate:
    repository: python
    tag: 3.12-slim
    pullPolicy: IfNotPresent

secrets:
  # Set true only for local/dev; production should use externalSecrets.
  create: false
  name: cybersecuritygovernor-secrets
  databaseUrl: postgresql+psycopg://postgres:CHANGE_ME@pgbouncer:6432/cybersecuritygovernor
  databaseUrlDirect: postgresql+psycopg://postgres:CHANGE_ME@postgres:5432/cybersecuritygovernor
  databaseReadUrl: ""
  postgresPassword: CHANGE_ME
  redisUrl: redis://redis:6379/0
  sidecarInternalTokens: CHANGE_ME
  securityAnchorS3Bucket: ""

externalSecrets:
  enabled: false
  secretStoreRef:
    name: cluster-secret-store
    kind: ClusterSecretStore
  remoteRefs:
    databaseUrl: cybersecuritygovernor/database-url
    databaseUrlDirect: cybersecuritygovernor/database-url-direct
    redisUrl: cybersecuritygovernor/redis-url
    sidecarInternalTokens: cybersecuritygovernor/sidecar-internal-tokens
    postgresPassword: cybersecuritygovernor/postgres-password
    openaiApiKey: cybersecuritygovernor/openai-api-key
    anthropicApiKey: cybersecuritygovernor/anthropic-api-key
    pgbouncerUserlist: cybersecuritygovernor/pgbouncer-userlist
    oidcIssuerUrl: cybersecuritygovernor/oidc-issuer-url
    oidcAudience: cybersecuritygovernor/oidc-audience
    securityAnchorS3Bucket: cybersecuritygovernor/security-anchor-s3-bucket

postgres:
  enabled: true
  replicas: 1
  database: cybersecuritygovernor
  user: postgres
  external:
    enabled: false
    host: ""
    port: 5432
    sslMode: require
    readReplica:
      enabled: false
      host: ""
      port: 5432
    rds:
      enabled: false
      iamAuth: false
  storage:
    emptyDir: true

pgbouncer:
  enabled: true
  replicas: 2
  poolMode: transaction
  maxClientConn: 500
  defaultPoolSize: 20
  pdb:
    enabled: false
    minAvailable: 1

redis:
  enabled: true
  replicas: 1
  sentinel:
    enabled: false
    masterName: mymaster
    replicas: 3
    replicaReplicas: 1

sidecar:
  replicas: 3
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilization: 70
  pdb:
    enabled: true
    minAvailable: 2
  otel:
    endpoint: http://otel-collector:4318
    serviceName: cybersecuritygovernor-sidecar

gateway:
  enabled: true
  replicas: 2
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilization: 70
  pdb:
    enabled: true
    minAvailable: 2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 300m
      memory: 256Mi

# Plug-and-play platform workloads — nine cyber enforcement platforms
platforms:
  egress_govern:
    enabled: true
    name: egress_govern
    imageKey: egressGovern
    port: 8123
    replicas: 2
    hpa:
      enabled: false
      minReplicas: 2
      maxReplicas: 24
      targetCPUUtilization: 70
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 300m
        memory: 256Mi
  identity_govern:
    enabled: true
    name: identity_govern
    imageKey: identityGovern
    port: 8124
    replicas: 2
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 300m
        memory: 256Mi
  threat_proxy:
    enabled: true
    name: threat_proxy
    imageKey: threatProxy
    port: 8125
    replicas: 2
    hpa:
      enabled: false
      minReplicas: 2
      maxReplicas: 16
      targetCPUUtilization: 70
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 300m
        memory: 256Mi
  incident_response_gate:
    enabled: true
    name: incident_response_gate
    imageKey: incidentResponseGate
    port: 8126
    replicas: 2
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 300m
        memory: 256Mi
  posture_reconcile:
    enabled: true
    name: posture_reconcile
    imageKey: postureReconcile
    port: 8127
    replicas: 2
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 300m
        memory: 256Mi
  compliance_logger:
    enabled: true
    name: compliance_logger
    imageKey: complianceLogger
    port: 8128
    replicas: 2
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 300m
        memory: 256Mi
  witness_bridge:
    enabled: true
    name: witness_bridge
    imageKey: witnessBridge
    port: 8129
    replicas: 2
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 300m
        memory: 256Mi
  lineage_ingest:
    enabled: true
    name: lineage_ingest
    imageKey: lineageIngest
    port: 8130
    replicas: 2
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 300m
        memory: 256Mi
  content_guard:
    enabled: true
    name: content_guard
    imageKey: contentGuard
    port: 8131
    replicas: 2
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 300m
        memory: 256Mi

reconciler:
  enabled: true
  replicas: 2
  sweepIntervalSeconds: 30
  pdb:
    enabled: false
    minAvailable: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

migrations:
  enabled: true
  argocd:
    preSyncHook: true

otelCollector:
  enabled: true

monitoring:
  prometheusRules:
    enabled: true
  grafanaDashboard:
    enabled: true
  sidecarPodMonitor:
    enabled: true
  reconcilerPodMonitor:
    enabled: true

syntheticProbe:
  enabled: true
  schedule: "*/5 * * * *"

ledgerChainVerify:
  enabled: true
  schedule: "0 * * * *"

ledgerChainAnchor:
  enabled: true
  schedule: "15 * * * *"

governanceCanary:
  enabled: true
  schedule: "*/10 * * * *"

postureReconcileVersionProbe:
  enabled: false
  schedule: "*/15 * * * *"

egressGovernGoldenProbe:
  enabled: false
  schedule: "*/15 * * * *"

networkPolicy:
  enabled: true

serviceAccounts:
  create: false
  platform:
    name: cg-platform-workload
  gateway:
    name: cg-gateway-workload

config:
  commitTtlSeconds: "300"
  driftAbsoluteTolerance: "0.500000"
  driftRatioTolerance: "0.050000"
  dbPoolSize: "3"
  dbMaxOverflow: "2"
  dbPoolTimeoutSeconds: "5"
  dbPoolRecycleSeconds: "900"
  guardrailsEnabled: "true"
  rateLimitPerMinute: "120"
  maxSecurityDepth: "50"
  maxAccountInflight: "10"
  circuitBreakerEnabled: "true"
  circuitBreakerFailureThreshold: "5"
  circuitBreakerWindowSeconds: "60"
  circuitBreakerOpenSeconds: "30"
  fallbackGlobalTokensPerSecond: "20"
  fallbackTokenBucketCapacity: "40"
  fallbackRateLimitPerMinute: "60"
  fallbackMaxSecurityDepth: "50"
  fallbackMaxAccountInflight: "5"
  oidcEnabled: "false"
  oidcAllowInternalTokenFallback: "true"
  oidcViewerRoles: "viewer,cybersecuritygovernor-viewer"
  oidcSecurityAdminRoles: "security-admin,cybersecuritygovernor-security-admin"
  oidcIssuerUrl: ""
  oidcAudience: ""
  securityAnchorS3Prefix: "security-anchors"
  securityAnchorS3ObjectLockEnabled: "false"
  securityAnchorS3ObjectLockMode: "GOVERNANCE"
  securityAnchorS3RetentionDays: "3650"
  securityAnchorS3Region: ""
  platformRegistryEnforce: "true"

# Live integrations — threat intel / SIEM (enterprise overlays)
integrations:
  siemExportMode: stub          # stub | splunk | sentinel
  threatIntelMode: mock         # mock | live
  threatIntelSource: crowdstrike
  splunkHecUrl: ""
  sentinelWorkspaceId: ""
  threatIntelFeedUrl: ""

enterprise:
  istio:
    enabled: false
    mtlsMode: STRICT
    egress:
      threatIntel:
        - api.crowdstrike.com
        - ctldl.windowsupdate.com
      siemEndpoints:
        - ingest.splunk.example.com
        - ods.opinsights.azure.com
