# Institutional++ scalability overlay — 90%+ architecture rating target
# Usage:
#   helm upgrade --install cg ./deploy/helm/cybersecuritygovernor \
#     -f values-production.yaml -f values-enterprise.yaml -f values-scalability.yaml

sidecar:
  replicas: 6
  hpa:
    enabled: true
    minReplicas: 4
    maxReplicas: 16
    targetCPUUtilization: 65

gateway:
  replicas: 4
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 12
    targetCPUUtilization: 65
  pdb:
    enabled: true
    minAvailable: 3

pgbouncer:
  replicas: 4
  defaultPoolSize: 30
  maxClientConn: 750

postgres:
  external:
    readReplica:
      enabled: true

config:
  dbPoolSize: "5"
  chainVerifyIncremental: "true"

redis:
  sentinel:
    enabled: true
    replicas: 3
    replicaReplicas: 2

platforms:
  egress_govern:
    hpa:
      enabled: true
      minReplicas: 3
      maxReplicas: 32
  threat_proxy:
    hpa:
      enabled: true
      minReplicas: 3
      maxReplicas: 24

monitoring:
  prometheusRules:
    enabled: true
  scalabilityAlerts:
    enabled: true
