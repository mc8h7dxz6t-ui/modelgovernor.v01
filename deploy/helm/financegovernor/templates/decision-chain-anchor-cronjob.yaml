{{- if .Values.ledgerChainAnchor.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: fg-decision-chain-anchor
  namespace: {{ include "financegovernor.namespace" . }}
  labels:
    {{- include "financegovernor.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.ledgerChainAnchor.schedule | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: anchor
              image: curlimages/curl:8.5.0
              env:
                - name: FG_INTERNAL_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "financegovernor.secretName" . }}
                      key: fg-internal-tokens
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  TOKEN="${FG_INTERNAL_TOKEN%%,*}"
                  curl -sf -X POST -H "x-internal-token: ${TOKEN}" \
                    "http://fg-sidecar:8091/internal/decisions/anchor-head"
                  echo "fg decision chain anchor ok"
{{- end }}
