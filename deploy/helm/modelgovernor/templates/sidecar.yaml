apiVersion: apps/v1
kind: Deployment
metadata:
  name: sidecar
  namespace: {{ include "modelgovernor.namespace" . }}
  labels:
    app: sidecar
    app.kubernetes.io/component: policy-sidecar
    {{- include "modelgovernor.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: {{ .Values.sidecar.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sidecar
  template:
    metadata:
      labels:
        app: sidecar
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: sidecar
          image: {{ .Values.images.sidecar.repository }}:{{ .Values.images.sidecar.tag }}
          imagePullPolicy: {{ .Values.images.sidecar.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: modelgovernor-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "modelgovernor.secretName" . }}
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "modelgovernor.secretName" . }}
                  key: redis-url
            - name: SIDECAR_INTERNAL_TOKENS
              valueFrom:
                secretKeyRef:
                  name: {{ include "modelgovernor.secretName" . }}
                  key: sidecar-internal-tokens
            {{- if .Values.otelCollector.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.sidecar.otel.endpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.sidecar.otel.serviceName | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.sidecar.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: sidecar
  namespace: {{ include "modelgovernor.namespace" . }}
  labels:
    app: sidecar
    {{- include "modelgovernor.labels" . | nindent 4 }}
spec:
  selector:
    app: sidecar
  ports:
    - name: http
      port: 8081
      targetPort: 8081
{{- if .Values.sidecar.pdb.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sidecar-pdb
  namespace: {{ include "modelgovernor.namespace" . }}
  labels:
    {{- include "modelgovernor.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.sidecar.pdb.minAvailable }}
  selector:
    matchLabels:
      app: sidecar
{{- end }}
{{- if .Values.sidecar.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sidecar-hpa
  namespace: {{ include "modelgovernor.namespace" . }}
  labels:
    {{- include "modelgovernor.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sidecar
  minReplicas: {{ .Values.sidecar.hpa.minReplicas }}
  maxReplicas: {{ .Values.sidecar.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.sidecar.hpa.targetCPUUtilization }}
{{- end }}
