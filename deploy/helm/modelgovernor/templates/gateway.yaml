{{- if .Values.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: {{ include "modelgovernor.namespace" . }}
  labels:
    app: gateway
    {{- include "modelgovernor.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: gateway
          image: {{ .Values.images.gateway.repository }}:{{ .Values.images.gateway.tag }}
          imagePullPolicy: {{ .Values.images.gateway.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: SIDECAR_URL
              value: http://sidecar:8081
            - name: SIDECAR_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "modelgovernor.secretName" . }}
                  key: sidecar-internal-tokens
            - name: MOCK_DISPATCH_COST
              value: {{ .Values.gateway.mockDispatchCost | quote }}
            - name: OIDC_ENABLED
              value: {{ .Values.gateway.oidc.enabled | quote }}
            {{- if .Values.gateway.oidc.issuerUrl }}
            - name: OIDC_ISSUER_URL
              value: {{ .Values.gateway.oidc.issuerUrl | quote }}
            {{- end }}
            {{- if .Values.gateway.oidc.audience }}
            - name: OIDC_AUDIENCE
              value: {{ .Values.gateway.oidc.audience | quote }}
            {{- end }}
            - name: OIDC_DISPATCH_ROLES
              value: {{ .Values.gateway.oidc.dispatchRoles | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: {{ include "modelgovernor.namespace" . }}
  labels:
    app: gateway
    {{- include "modelgovernor.labels" . | nindent 4 }}
spec:
  selector:
    app: gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
{{- end }}
