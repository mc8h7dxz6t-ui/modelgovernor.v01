# Insurance Governor L4 Gold — enterprise overlay
# Usage:
#   helm upgrade --install ig ./deploy/helm/insurancegovernor \
#     -f values-production.yaml -f values-enterprise.yaml

global:
  namespace: insurancegovernor

sidecar:
  replicas: 5
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 12
    targetCPUUtilization: 70
  pdb:
    enabled: true
    minAvailable: 3

gateway:
  replicas: 3
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilization: 70
  pdb:
    enabled: true
    minAvailable: 2

reconciler:
  replicas: 3
  pdb:
    enabled: true
    minAvailable: 2

postgres:
  enabled: true
  external:
    enabled: false

pgbouncer:
  enabled: true
  replicas: 3
  maxClientConn: 500
  defaultPoolSize: 25
  pdb:
    enabled: true
    minAvailable: 2

redis:
  enabled: false
  sentinel:
    enabled: true
    replicas: 3
    replicaReplicas: 1

enterprise:
  istio:
    enabled: true
    mtlsMode: STRICT

config:
  oidcEnabled: "true"
  oidcAllowInternalTokenFallback: "false"
  platformRegistryEnforce: "true"
  claimAnchorS3ObjectLockEnabled: "true"

externalSecrets:
  enabled: true

secrets:
  create: true

monitoring:
  prometheusRules:
    enabled: true
  sidecarPodMonitor:
    enabled: true
  reconcilerPodMonitor:
    enabled: true

syntheticProbe:
  enabled: true
  schedule: "*/10 * * * *"

ledgerChainVerify:
  enabled: true
  schedule: "0 * * * *"

ledgerChainAnchor:
  enabled: true
  schedule: "15 * * * *"

governanceCanary:
  enabled: true
  schedule: "*/5 * * * *"

modelRiskFreezeVersionProbe:
  enabled: true
  schedule: "*/15 * * * *"

claimGateGoldenProbe:
  enabled: true
  schedule: "*/15 * * * *"

networkPolicy:
  enabled: true

serviceAccounts:
  create: true

platforms:
  claim_gate:
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 24
  parametric_oracle:
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 16

integrations:
  paymentRailMode: fednow
  oracleFeedMode: live
  oracleFeedSource: usgs-live
