sidecar:
  replicas: 3
  hpa:
    minReplicas: 3
    maxReplicas: 12

gateway:
  replicas: 2
  providerMode: live
  oidc:
    enabled: true
    issuerUrl: ""
    audience: insurancegovernor

reconciler:
  replicas: 2

postgres:
  enabled: true

redis:
  enabled: false
  sentinel:
    enabled: true
    masterName: mymaster
    replicas: 3

externalSecrets:
  enabled: true

secrets:
  create: false

config:
  oidcEnabled: "true"
  gatewayOidcEnabled: "true"
  ledgerAnchorS3ObjectLockEnabled: "true"

syntheticProbe:
  enabled: true

enterprise:
  istio:
    enabled: true
