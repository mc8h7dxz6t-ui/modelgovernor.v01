{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "insurancegovernor.secretName" . }}
  namespace: {{ include "insurancegovernor.namespace" . }}
  labels:
    {{- include "insurancegovernor.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  database-url: {{ .Values.secrets.databaseUrl | quote }}
  database-url-direct: {{ .Values.secrets.databaseUrlDirect | quote }}
  postgres-password: {{ .Values.secrets.postgresPassword | quote }}
  redis-url: {{ .Values.secrets.redisUrl | quote }}
  sidecar-internal-tokens: {{ .Values.secrets.sidecarInternalTokens | quote }}
  {{- if .Values.secrets.claimAnchorS3Bucket }}
  claim-anchor-s3-bucket: {{ .Values.secrets.claimAnchorS3Bucket | quote }}
  {{- end }}
{{- end }}
