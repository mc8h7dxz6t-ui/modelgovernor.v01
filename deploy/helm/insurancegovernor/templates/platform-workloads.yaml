{{- range $key, $plat := .Values.platforms }}
{{- if $plat.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $plat.name | replace "_" "-" }}
  namespace: {{ include "insurancegovernor.namespace" $ }}
  labels:
    app: {{ $plat.name | replace "_" "-" }}
    insurancegovernor.io/platform: {{ $plat.name | quote }}
    {{- include "insurancegovernor.labels" $ | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  replicas: {{ $plat.replicas }}
  selector:
    matchLabels:
      app: {{ $plat.name | replace "_" "-" }}
  template:
    metadata:
      labels:
        app: {{ $plat.name | replace "_" "-" }}
        insurancegovernor.io/platform: {{ $plat.name | quote }}
        insurancegovernor.io/component: platform
      annotations:
        {{- include "insurancegovernor.istioPodAnnotations" $ | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      {{- $sa := include "insurancegovernor.platformServiceAccountName" $ }}
      {{- if $sa }}
      serviceAccountName: {{ $sa }}
      {{- end }}
      containers:
        - name: {{ $plat.name | replace "_" "-" }}
          image: {{ index $.Values.images $plat.imageKey "repository" }}:{{ index $.Values.images $plat.imageKey "tag" }}
          imagePullPolicy: {{ index $.Values.images $plat.imageKey "pullPolicy" }}
          ports:
            - containerPort: {{ $plat.port }}
          env:
            - name: IG_SPINE_ENABLED
              value: "true"
            - name: IG_SIDECAR_URL
              value: http://sidecar:8101
            - name: IG_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "insurancegovernor.secretName" $ }}
                  key: sidecar-internal-tokens
            {{- include "insurancegovernor.platformIntegrationEnv" (dict "root" $) | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ $plat.port }}
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ $plat.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml $plat.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $plat.name | replace "_" "-" }}
  namespace: {{ include "insurancegovernor.namespace" $ }}
  labels:
    app: {{ $plat.name | replace "_" "-" }}
    insurancegovernor.io/platform: {{ $plat.name | quote }}
    {{- include "insurancegovernor.labels" $ | nindent 4 }}
spec:
  selector:
    app: {{ $plat.name | replace "_" "-" }}
  ports:
    - name: http
      port: {{ $plat.port }}
      targetPort: {{ $plat.port }}
{{- end }}
{{- end }}
