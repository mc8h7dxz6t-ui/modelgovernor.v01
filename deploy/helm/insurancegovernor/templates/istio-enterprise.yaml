{{- if .Values.enterprise.istio.enabled }}
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: {{ include "insurancegovernor.namespace" . }}
  labels:
    {{- include "insurancegovernor.labels" . | nindent 4 }}
spec:
  mtls:
    mode: {{ .Values.enterprise.istio.mtlsMode | default "STRICT" }}
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: insurancegovernor-mtls
  namespace: {{ include "insurancegovernor.namespace" . }}
spec:
  host: "*.{{ include "insurancegovernor.namespace" . }}.svc.cluster.local"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: bank-rail-egress
  namespace: {{ include "insurancegovernor.namespace" . }}
spec:
  hosts:
    {{- range .Values.enterprise.istio.egress.bankRails }}
    - {{ . | quote }}
    {{- end }}
  location: MESH_EXTERNAL
  ports:
    - number: 443
      name: https
      protocol: HTTPS
  resolution: DNS
---
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: oracle-feed-egress
  namespace: {{ include "insurancegovernor.namespace" . }}
spec:
  hosts:
    {{- range .Values.enterprise.istio.egress.oracleFeeds }}
    - {{ . | quote }}
    {{- end }}
  location: MESH_EXTERNAL
  ports:
    - number: 443
      name: https
      protocol: HTTPS
  resolution: DNS
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: platform-egress-allowlist
  namespace: {{ include "insurancegovernor.namespace" . }}
spec:
  selector:
    matchLabels:
      insurancegovernor.io/component: platform
  action: ALLOW
  rules:
    - to:
        - operation:
            hosts:
              {{- range .Values.enterprise.istio.egress.bankRails }}
              - {{ . | quote }}
              {{- end }}
              {{- range .Values.enterprise.istio.egress.oracleFeeds }}
              - {{ . | quote }}
              {{- end }}
              - sidecar.{{ include "insurancegovernor.namespace" . }}.svc.cluster.local
{{- end }}
