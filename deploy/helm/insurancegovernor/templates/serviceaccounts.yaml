{{- if .Values.serviceAccounts.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccounts.platform.name }}
  namespace: {{ include "insurancegovernor.namespace" . }}
  labels:
    insurancegovernor.io/component: platform
    {{- include "insurancegovernor.labels" . | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccounts.gateway.name }}
  namespace: {{ include "insurancegovernor.namespace" . }}
  labels:
    insurancegovernor.io/component: gateway
    {{- include "insurancegovernor.labels" . | nindent 4 }}
{{- end }}
