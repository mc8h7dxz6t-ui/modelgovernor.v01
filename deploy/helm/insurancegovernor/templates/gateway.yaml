{{- if .Values.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: {{ include "insurancegovernor.namespace" . }}
  labels:
    app: gateway
    {{- include "insurancegovernor.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
      annotations:
        {{- include "insurancegovernor.istioPodAnnotations" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      {{- $sa := include "insurancegovernor.gatewayServiceAccountName" . }}
      {{- if $sa }}
      serviceAccountName: {{ $sa }}
      {{- end }}
      containers:
        - name: gateway
          image: {{ .Values.images.gateway.repository }}:{{ .Values.images.gateway.tag }}
          imagePullPolicy: {{ .Values.images.gateway.pullPolicy }}
          ports:
            - containerPort: 8100
          env:
            - name: IG_SIDECAR_URL
              value: http://sidecar:8101
            - name: IG_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "insurancegovernor.secretName" . }}
                  key: sidecar-internal-tokens
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8100
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8100
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: {{ include "insurancegovernor.namespace" . }}
  labels:
    app: gateway
    {{- include "insurancegovernor.labels" . | nindent 4 }}
spec:
  selector:
    app: gateway
  ports:
    - name: http
      port: 8100
      targetPort: 8100
{{- end }}
