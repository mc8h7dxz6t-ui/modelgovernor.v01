{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "insurancegovernor.secretName" . }}
  namespace: {{ include "insurancegovernor.namespace" . }}
  labels:
    {{- include "insurancegovernor.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ include "insurancegovernor.secretName" . }}
    creationPolicy: Owner
  data:
    - secretKey: database-url
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.databaseUrl }}
    - secretKey: database-url-direct
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.databaseUrlDirect }}
    - secretKey: redis-url
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.redisUrl }}
    - secretKey: sidecar-internal-tokens
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.sidecarInternalTokens }}
    - secretKey: postgres-password
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.postgresPassword }}
    {{- if .Values.externalSecrets.remoteRefs.openaiApiKey }}
    - secretKey: openai-api-key
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.openaiApiKey }}
    {{- end }}
    {{- if .Values.externalSecrets.remoteRefs.anthropicApiKey }}
    - secretKey: anthropic-api-key
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.anthropicApiKey }}
    {{- end }}
    {{- if .Values.externalSecrets.remoteRefs.pgbouncerUserlist }}
    - secretKey: pgbouncer-userlist
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.pgbouncerUserlist }}
    {{- end }}
    {{- if .Values.externalSecrets.remoteRefs.oidcIssuerUrl }}
    - secretKey: oidc-issuer-url
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.oidcIssuerUrl }}
    {{- end }}
    {{- if .Values.externalSecrets.remoteRefs.oidcAudience }}
    - secretKey: oidc-audience
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.oidcAudience }}
    {{- end }}
    {{- if .Values.externalSecrets.remoteRefs.claimAnchorS3Bucket }}
    - secretKey: claim-anchor-s3-bucket
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.claimAnchorS3Bucket }}
    {{- end }}
{{- end }}
