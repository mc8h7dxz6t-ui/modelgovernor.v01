{{- if .Values.redis.sentinel.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-sentinel-config
  namespace: {{ include "insurancegovernor.namespace" . }}
data:
  sentinel.conf: |
    port 26379
    dir /tmp
    sentinel monitor {{ .Values.redis.sentinel.masterName }} redis-master 6379 2
    sentinel down-after-milliseconds {{ .Values.redis.sentinel.masterName }} 5000
    sentinel failover-timeout {{ .Values.redis.sentinel.masterName }} 60000
    sentinel parallel-syncs {{ .Values.redis.sentinel.masterName }} 1
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-master
  namespace: {{ include "insurancegovernor.namespace" . }}
spec:
  serviceName: redis-master
  replicas: 1
  selector:
    matchLabels:
      app: redis-master
  template:
    metadata:
      labels:
        app: redis-master
    spec:
      containers:
        - name: redis
          image: {{ .Values.images.redis.repository }}:{{ .Values.images.redis.tag }}
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  namespace: {{ include "insurancegovernor.namespace" . }}
spec:
  selector:
    app: redis-master
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-sentinel
  namespace: {{ include "insurancegovernor.namespace" . }}
spec:
  replicas: {{ .Values.redis.sentinel.replicas }}
  selector:
    matchLabels:
      app: redis-sentinel
  template:
    metadata:
      labels:
        app: redis-sentinel
    spec:
      containers:
        - name: sentinel
          image: {{ .Values.images.redis.repository }}:{{ .Values.images.redis.tag }}
          command: ["redis-sentinel", "/etc/redis/sentinel.conf"]
          ports:
            - containerPort: 26379
          volumeMounts:
            - name: sentinel-config
              mountPath: /etc/redis
      volumes:
        - name: sentinel-config
          configMap:
            name: redis-sentinel-config
---
apiVersion: v1
kind: Service
metadata:
  name: redis-sentinel
  namespace: {{ include "insurancegovernor.namespace" . }}
spec:
  selector:
    app: redis-sentinel
  ports:
    - port: 26379
      targetPort: 26379
{{- end }}
