# Insurance Governor institutional++ scalability overlay
# Usage:
#   helm upgrade --install ig ./deploy/helm/insurancegovernor \
#     -f values-production.yaml -f values-enterprise.yaml -f values-scalability.yaml

sidecar:
  replicas: 6
  hpa:
    enabled: true
    minReplicas: 4
    maxReplicas: 16
    targetCPUUtilization: 65

gateway:
  replicas: 4
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 12
    targetCPUUtilization: 65
  pdb:
    enabled: true
    minAvailable: 3

pgbouncer:
  replicas: 4
  defaultPoolSize: 30
  maxClientConn: 750

postgres:
  external:
    readReplica:
      enabled: true

redis:
  sentinel:
    enabled: true
    replicas: 3
    replicaReplicas: 2

platforms:
  claim_gate:
    hpa:
      enabled: true
      minReplicas: 3
      maxReplicas: 32
  parametric_oracle:
    hpa:
      enabled: true
      minReplicas: 3
      maxReplicas: 24

monitoring:
  prometheusRules:
    enabled: true
