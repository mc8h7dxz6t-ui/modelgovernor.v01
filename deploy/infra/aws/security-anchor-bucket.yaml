AWSTemplateFormatVersion: "2010-09-09"
Description: Cybersecurity Governor tamper-evident security chain anchor bucket with Object Lock.

Parameters:
  BucketName:
    Type: String
    Description: Globally unique S3 bucket name for security chain anchors.

Resources:
  SecurityAnchorBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref BucketName
      ObjectLockEnabled: true
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms

  SecurityAnchorObjectLockDefault:
    Type: AWS::S3::BucketObjectLockConfiguration
    Properties:
      Bucket: !Ref SecurityAnchorBucket
      ObjectLockConfiguration:
        ObjectLockEnabled: Enabled
        Rule:
          DefaultRetention:
            Mode: GOVERNANCE
            Years: 10

Outputs:
  BucketName:
    Value: !Ref SecurityAnchorBucket
  BucketArn:
    Value: !GetAtt SecurityAnchorBucket.Arn
