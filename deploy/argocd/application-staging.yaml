apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: modelgovernor-staging
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: modelgovernor
    environment: staging
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: modelgovernor
  source:
    repoURL: https://github.com/mc8h7dxz6t-ui/modelgovernor.v01
    targetRevision: main
    path: deploy/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: modelgovernor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m
