apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: modelgovernor
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: ModelGovernor finance control plane — institutional++ production topology
  sourceRepos:
    - https://github.com/mc8h7dxz6t-ui/modelgovernor.v01
    - '*'
  destinations:
    - namespace: modelgovernor
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  orphanedResources:
    warn: true
