apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: modelgovernor-production
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: modelgovernor
    environment: production
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: modelgovernor
  source:
    repoURL: https://github.com/mc8h7dxz6t-ui/modelgovernor.v01
    targetRevision: main
    path: deploy/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: modelgovernor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: autoscaling
      kind: HorizontalPodAutoscaler
      jsonPointers:
        - /spec/minReplicas
        - /spec/maxReplicas
