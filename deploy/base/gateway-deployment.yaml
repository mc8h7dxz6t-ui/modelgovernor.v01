apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: modelgovernor
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: gateway
          image: modelgovernor/gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: SIDECAR_URL
              value: http://sidecar:8081
            - name: SIDECAR_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: modelgovernor-secrets
                  key: sidecar-internal-tokens
            - name: OIDC_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: modelgovernor-config
                  key: GATEWAY_OIDC_ENABLED
            - name: OIDC_ISSUER_URL
              valueFrom:
                configMapKeyRef:
                  name: modelgovernor-config
                  key: GATEWAY_OIDC_ISSUER_URL
                  optional: true
            - name: OIDC_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: modelgovernor-config
                  key: GATEWAY_OIDC_AUDIENCE
                  optional: true
            - name: OIDC_DISPATCH_ROLES
              valueFrom:
                configMapKeyRef:
                  name: modelgovernor-config
                  key: GATEWAY_OIDC_DISPATCH_ROLES
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi

---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: modelgovernor
spec:
  selector:
    app: gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
