apiVersion: apps/v1
kind: Deployment
metadata:
  name: reconciler
  namespace: modelgovernor
  labels:
    app: reconciler
    component: governance
spec:
  # Reconciler must run as a single replica to avoid duplicate expiry sweeps.
  # Scale through increased batch size and interval tuning, not replica count.
  replicas: 1
  selector:
    matchLabels:
      app: reconciler
  template:
    metadata:
      labels:
        app: reconciler
        component: governance
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: reconciler
          image: modelgovernor/reconciler:latest
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
          envFrom:
            - configMapRef:
                name: modelgovernor-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: modelgovernor-secrets
                  key: database-url
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      terminationGracePeriodSeconds: 60
