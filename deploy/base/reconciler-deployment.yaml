apiVersion: apps/v1
kind: Deployment
metadata:
  name: reconciler
  namespace: modelgovernor
  labels:
    app: reconciler
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reconciler
  template:
    metadata:
      labels:
        app: reconciler
    spec:
      containers:
        - name: reconciler
          image: modelgovernor/reconciler:latest
          ports:
            - containerPort: 8082
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: modelgovernor-secrets
                  key: database-url
            - name: RECONCILER_MODE
              value: daemon
            - name: SWEEP_INTERVAL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: modelgovernor-config
                  key: SWEEP_INTERVAL_SECONDS
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: reconciler-cron
  namespace: modelgovernor
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: reconciler
              image: modelgovernor/reconciler:latest
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: modelgovernor-secrets
                      key: database-url
                - name: RECONCILER_MODE
                  value: once
          restartPolicy: Never

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: reconciler-standby
  namespace: modelgovernor
spec:
  schedule: "1-59/2 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: reconciler
              image: modelgovernor/reconciler:latest
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: modelgovernor-secrets
                      key: database-url
                - name: RECONCILER_MODE
                  value: once
          restartPolicy: Never
