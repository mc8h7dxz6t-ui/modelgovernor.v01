apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sidecar
  namespace: modelgovernor
  labels:
    app: sidecar
    component: governance
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sidecar
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
