apiVersion: batch/v1
kind: Job
metadata:
  name: modelgovernor-migrate
  namespace: modelgovernor
  labels:
    app: migrate
    component: governance
  annotations:
    # Re-run this job after each deployment to apply pending migrations.
    # Use a unique name suffix per release (e.g., modelgovernor-migrate-v0-2-0).
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app: migrate
        component: governance
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: migrate
          image: modelgovernor/sidecar:latest
          command:
            - sh
            - -c
            - |
              for f in /migrations/*.sql; do
                echo "Applying $f"
                psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
              done
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: modelgovernor-secrets
                  key: database-url
          volumeMounts:
            - name: migrations
              mountPath: /migrations
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: migrations
          configMap:
            name: modelgovernor-migrations
