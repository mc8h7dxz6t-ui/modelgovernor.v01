apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sidecar-allow-ingress
  namespace: modelgovernor
spec:
  podSelector:
    matchLabels:
      app: sidecar
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - gateway
                  - sidecar
                  - reconciler
      ports:
        - protocol: TCP
          port: 8081
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8081
