apiVersion: batch/v1
kind: CronJob
metadata:
  name: synthetic-canary
  namespace: modelgovernor
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: canary
              image: curlimages/curl:8.5.0
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  curl -sf http://sidecar:8081/readyz
                  curl -sf http://gateway:8080/readyz
                  curl -sf http://reconciler:8082/healthz
                  echo "synthetic canary probes ok"
