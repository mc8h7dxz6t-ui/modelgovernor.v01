apiVersion: apps/v1
kind: Deployment
metadata:
  name: sidecar
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sidecar
  template:
    metadata:
      labels:
        app: sidecar
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
      containers:
        - name: sidecar
          image: ghcr.io/mc8h7dxz6t-ui/modelgovernor-sidecar:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: modelgovernor-sidecar-secret
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: modelgovernor-sidecar-secret
                  key: REDIS_URL
            - name: SIDECAR_INTERNAL_TOKENS
              valueFrom:
                secretKeyRef:
                  name: modelgovernor-sidecar-secret
                  key: SIDECAR_INTERNAL_TOKENS
            - name: DEFAULT_TRACE_CAP_AMOUNT
              value: "25.000000"
            - name: DRIFT_ABSOLUTE_TOLERANCE
              value: "0.500000"
            - name: DRIFT_RATIO_TOLERANCE
              value: "0.050000"
            - name: DB_POOL_SIZE
              value: "5"
            - name: DB_MAX_OVERFLOW
              value: "2"
            - name: DB_POOL_TIMEOUT_SECONDS
              value: "5"
            - name: DB_POOL_RECYCLE_SECONDS
              value: "1800"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
