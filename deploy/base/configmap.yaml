apiVersion: v1
kind: ConfigMap
metadata:
  name: modelgovernor-config
  namespace: modelgovernor
data:
  DEFAULT_TRACE_CAP_AMOUNT: "25.000000"
  DRIFT_ABSOLUTE_TOLERANCE: "0.500000"
  DRIFT_RATIO_TOLERANCE: "0.050000"
  DB_POOL_SIZE: "3"
  DB_MAX_OVERFLOW: "2"
  DB_POOL_TIMEOUT_SECONDS: "5"
  DB_POOL_RECYCLE_SECONDS: "900"
  SWEEP_INTERVAL_SECONDS: "30"
  GUARDRAILS_ENABLED: "true"
  RATE_LIMIT_PER_MINUTE: "120"
  MAX_TRACE_DEPTH: "50"
  MAX_USER_INFLIGHT: "10"
  CIRCUIT_BREAKER_ENABLED: "true"
  FALLBACK_GLOBAL_TOKENS_PER_SECOND: "20"
  FALLBACK_TOKEN_BUCKET_CAPACITY: "40"
  FALLBACK_RATE_LIMIT_PER_MINUTE: "60"
  FALLBACK_MAX_USER_INFLIGHT: "5"
  OIDC_ENABLED: "false"
  OIDC_ALLOW_INTERNAL_TOKEN_FALLBACK: "true"
  OIDC_VIEWER_ROLES: "viewer,modelgovernor-viewer"
  OIDC_FINANCIAL_ADMIN_ROLES: "financial-admin,modelgovernor-financial-admin"
  GATEWAY_OIDC_ENABLED: "false"
  GATEWAY_OIDC_ISSUER_URL: ""
  GATEWAY_OIDC_AUDIENCE: ""
  GATEWAY_OIDC_DISPATCH_ROLES: "dispatch,modelgovernor-dispatch"
  LEDGER_ANCHOR_S3_OBJECT_LOCK_ENABLED: "false"
