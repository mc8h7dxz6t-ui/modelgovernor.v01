apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: modelgovernor-sidecar-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: modelgovernor-secrets
    kind: ClusterSecretStore
  target:
    name: modelgovernor-sidecar-secret
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: modelgovernor-database-url
    - secretKey: REDIS_URL
      remoteRef:
        key: modelgovernor-redis-url
    - secretKey: SIDECAR_INTERNAL_TOKENS
      remoteRef:
        key: modelgovernor-sidecar-tokens
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: modelgovernor-reconciler-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: modelgovernor-secrets
    kind: ClusterSecretStore
  target:
    name: modelgovernor-reconciler-secret
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: modelgovernor-database-url
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: modelgovernor-gateway-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: modelgovernor-secrets
    kind: ClusterSecretStore
  target:
    name: modelgovernor-gateway-secret
    creationPolicy: Owner
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: modelgovernor-openai-api-key
    - secretKey: LITELLM_MASTER_KEY
      remoteRef:
        key: modelgovernor-litellm-master-key
