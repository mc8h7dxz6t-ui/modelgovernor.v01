apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: modelgovernor

configMapGenerator:
  - name: migrations-bundle
    files:
      - migrations/0001_init.sql
      - migrations/0002_seed_model_policy.sql
      - migrations/0003_harden_ledger_constraints.sql
      - migrations/0004_ledger_control_plane_hardening.sql
      - migrations/0005_invariant_constraints.sql
      - migrations/0006_execution_attribution_guardrails.sql

resources:
  - namespace.yaml
  - configmap.yaml
  - pgbouncer.yaml
  - sidecar-deployment.yaml
  - reconciler-deployment.yaml
  - migration-job.yaml
  - prometheus-rules.yaml
  - sidecar-podmonitor.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: modelgovernor
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false
