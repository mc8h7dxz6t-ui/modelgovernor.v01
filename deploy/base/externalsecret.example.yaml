# Example ExternalSecrets wiring — apply via overlay when ESO is installed.
# https://external-secrets.io/

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: modelgovernor-secrets
  namespace: modelgovernor
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: modelgovernor-secrets
    creationPolicy: Owner
  data:
    - secretKey: database-url
      remoteRef:
        key: modelgovernor/database-url
    - secretKey: database-url-direct
      remoteRef:
        key: modelgovernor/database-url-direct
    - secretKey: redis-url
      remoteRef:
        key: modelgovernor/redis-url
    - secretKey: sidecar-internal-tokens
      remoteRef:
        key: modelgovernor/sidecar-internal-tokens
    - secretKey: postgres-password
      remoteRef:
        key: modelgovernor/postgres-password
