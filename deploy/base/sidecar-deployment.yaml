apiVersion: apps/v1
kind: Deployment
metadata:
  name: sidecar
  namespace: modelgovernor
  labels:
    app: sidecar
    app.kubernetes.io/component: policy-sidecar
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sidecar
  template:
    metadata:
      labels:
        app: sidecar
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: sidecar
          image: modelgovernor/sidecar:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: modelgovernor-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: modelgovernor-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: modelgovernor-secrets
                  key: redis-url
            - name: SIDECAR_INTERNAL_TOKENS
              valueFrom:
                secretKeyRef:
                  name: modelgovernor-secrets
                  key: sidecar-internal-tokens
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: sidecar
  namespace: modelgovernor
spec:
  selector:
    app: sidecar
  ports:
    - name: http
      port: 8081
      targetPort: 8081

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sidecar-pdb
  namespace: modelgovernor
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: sidecar

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sidecar-hpa
  namespace: modelgovernor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sidecar
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
