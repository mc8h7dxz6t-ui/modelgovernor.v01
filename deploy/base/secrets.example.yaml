# Example secret template — NOT applied by kustomize. Create in-cluster or via
# ExternalSecrets before deploying overlays.
#
#   kubectl create secret generic modelgovernor-secrets \
#     --namespace=modelgovernor \
#     --from-literal=database-url='postgresql+psycopg://postgres:SECRET@pgbouncer:6432/modelgovernor' \
#     --from-literal=redis-url='redis://redis:6379/0' \
#     --from-literal=sidecar-internal-tokens='rotate-me'

apiVersion: v1
kind: Secret
metadata:
  name: modelgovernor-secrets
  namespace: modelgovernor
type: Opaque
stringData:
  database-url: postgresql+psycopg://postgres:CHANGE_ME@pgbouncer:6432/modelgovernor
  redis-url: redis://redis:6379/0
  sidecar-internal-tokens: CHANGE_ME
