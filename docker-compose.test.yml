# docker-compose.test.yml
#
# Minimal Postgres-only stack for running the institutional-grade vigorous test
# suite.  Brings up a fresh Postgres 16 instance with no persistent volume so
# every run starts from a clean state.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   POSTGRES_TEST_URL=postgresql+psycopg://postgres:postgres@localhost:5433/mg_test pytest tests/integration/test_postgres_vigorous.py -v
#   docker compose -f docker-compose.test.yml down
#
# Or run everything in one command:
#   docker compose -f docker-compose.test.yml run --rm test

services:
  postgres-test:
    image: postgres:16
    environment:
      POSTGRES_DB: mg_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mg_test"]
      interval: 2s
      timeout: 5s
      retries: 15
    tmpfs:
      - /var/lib/postgresql/data   # ephemeral — clean slate each run

  test:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      POSTGRES_TEST_URL: "postgresql+psycopg://postgres:postgres@postgres-test:5432/mg_test"
      PYTHONPATH: /app
    command: >
      bash -c "
        pip install -q -r sidecar/requirements.txt -r reconciler/requirements.txt pytest psycopg2-binary &&
        pytest tests/integration/test_postgres_vigorous.py tests/load/test_load_harness.py -v
      "
    depends_on:
      postgres-test:
        condition: service_healthy
