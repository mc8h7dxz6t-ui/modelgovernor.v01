# Insurance Governor — plug-and-play platform catalog
# Add a platform: create platforms/<name>/manifest.yaml and register here.

platforms:
  claim_gate:
    display_name: ClaimGate
    default_policy_id: claim-high-us
    default_risk_tier: high
    port: 8103
    docker_image: insurancegovernor/claim-gate
    required_facet_keys:
      - claim_id
    commit_decisions:
      - APPROVED

  bind_authority:
    display_name: BindAuthority
    default_policy_id: bind-standard-us
    default_risk_tier: high
    port: 8104
    docker_image: insurancegovernor/bind-authority
    required_facet_keys:
      - application_id
    commit_decisions:
      - BOUND

  parametric_oracle:
    display_name: ParametricOracle
    default_policy_id: parametric-cat-us
    default_risk_tier: critical
    port: 8105
    docker_image: insurancegovernor/parametric-oracle
    required_facet_keys:
      - event_id
      - oracle_attestation_hash
    commit_decisions:
      - TRIGGERED

  zk_claim_audit:
    display_name: ZkClaimAudit
    default_policy_id: zk-audit-us
    default_risk_tier: critical
    port: 8106
    docker_image: insurancegovernor/zk-claim-audit
    required_facet_keys:
      - claim_id
      - commitment_hash
    commit_decisions:
      - SEALED
      - VERIFIED

  spatial_twin:
    display_name: SpatialTwin
    default_policy_id: spatial-property-us
    default_risk_tier: high
    port: 8107
    docker_image: insurancegovernor/spatial-twin
    required_facet_keys:
      - claim_id
      - point_cloud_hash
    commit_decisions:
      - APPROVED

  battery_liability:
    display_name: BatteryLiability
    default_policy_id: ev-battery-us
    default_risk_tier: critical
    port: 8108
    docker_image: insurancegovernor/battery-liability
    required_facet_keys:
      - claim_id
    commit_decisions:
      - APPROVED

  subrogation_graph:
    display_name: SubrogationGraph
    default_policy_id: subrogation-us
    default_risk_tier: high
    port: 8109
    docker_image: insurancegovernor/subrogation-graph
    required_facet_keys:
      - claim_id
    commit_decisions:
      - RECOVERY_APPROVED

  indemnity_pay_gate:
    display_name: IndemnityPayGate
    default_policy_id: crime-indemnity-us
    default_risk_tier: critical
    port: 8110
    docker_image: insurancegovernor/indemnity-pay-gate
    required_facet_keys:
      - payment_id
      - indemnity_decision
    commit_decisions:
      - APPROVED
    loss_control_line: Crime / FI Bond
    finance_analogue: WireMatch

  model_risk_freeze:
    display_name: ModelRiskFreeze
    default_policy_id: model-risk-us
    default_risk_tier: critical
    port: 8111
    docker_image: insurancegovernor/model-risk-freeze
    required_facet_keys:
      - inference_id
      - freeze_state
    commit_decisions:
      - ACTIVE
    loss_control_line: E&O / Cyber
    finance_analogue: AlgoFreeze

  underwriting_govern:
    display_name: UnderwritingGovern
    default_policy_id: underwriting-fair-us
    default_risk_tier: high
    port: 8112
    docker_image: insurancegovernor/underwriting-govern
    required_facet_keys:
      - application_id
      - govern_decision
    commit_decisions:
      - COMPLIANT
    loss_control_line: D&O / Regulatory
    finance_analogue: CreditGovern

  reserve_reconcile:
    display_name: ReserveReconcile
    default_policy_id: reserve-sync-us
    default_risk_tier: high
    port: 8113
    docker_image: insurancegovernor/reserve-reconcile
    required_facet_keys:
      - claim_id
      - match_state
    commit_decisions:
      - MATCHED
    loss_control_line: Operational / D&O
    finance_analogue: SubledgerSync
