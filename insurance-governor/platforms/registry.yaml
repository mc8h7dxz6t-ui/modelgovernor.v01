# Insurance Governor — plug-and-play platform catalog
# Add a platform: create platforms/<name>/manifest.yaml and register here.

platforms:
  claim_gate:
    display_name: ClaimGate
    default_policy_id: claim-high-us
    default_risk_tier: high
    port: 8103
    docker_image: insurancegovernor/claim-gate
    required_facet_keys:
      - claim_id
    commit_decisions:
      - APPROVED

  bind_authority:
    display_name: BindAuthority
    default_policy_id: bind-standard-us
    default_risk_tier: high
    port: 8104
    docker_image: insurancegovernor/bind-authority
    required_facet_keys:
      - application_id
    commit_decisions:
      - BOUND

  parametric_oracle:
    display_name: ParametricOracle
    default_policy_id: parametric-cat-us
    default_risk_tier: critical
    port: 8105
    docker_image: insurancegovernor/parametric-oracle
    required_facet_keys:
      - event_id
      - oracle_attestation_hash
    commit_decisions:
      - TRIGGERED

  zk_claim_audit:
    display_name: ZkClaimAudit
    default_policy_id: zk-audit-us
    default_risk_tier: critical
    port: 8106
    docker_image: insurancegovernor/zk-claim-audit
    required_facet_keys:
      - claim_id
      - commitment_hash
    commit_decisions:
      - SEALED
      - VERIFIED

  spatial_twin:
    display_name: SpatialTwin
    default_policy_id: spatial-property-us
    default_risk_tier: high
    port: 8107
    docker_image: insurancegovernor/spatial-twin
    required_facet_keys:
      - claim_id
      - point_cloud_hash
    commit_decisions:
      - APPROVED

  battery_liability:
    display_name: BatteryLiability
    default_policy_id: ev-battery-us
    default_risk_tier: critical
    port: 8108
    docker_image: insurancegovernor/battery-liability
    required_facet_keys:
      - claim_id
    commit_decisions:
      - APPROVED

  subrogation_graph:
    display_name: SubrogationGraph
    default_policy_id: subrogation-us
    default_risk_tier: high
    port: 8109
    docker_image: insurancegovernor/subrogation-graph
    required_facet_keys:
      - claim_id
    commit_decisions:
      - RECOVERY_APPROVED
