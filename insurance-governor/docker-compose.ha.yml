# Insurance Governor HA rehearsal — PgBouncer + multi-reconciler leader election
#
# Usage:
#   docker compose -f insurance-governor/docker-compose.ha.yml up -d --build \
#     --scale ig-sidecar=2 --scale ig-reconciler=2
#   curl http://localhost:8101/readyz
#   curl http://localhost:8102/healthz

services:
  ig-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: insurancegovernor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ig_ha_postgres:/var/lib/postgresql/data
      - ./migrations/0001_ig_spine_init.sql:/docker-entrypoint-initdb.d/0001_init.sql:ro
      - ./migrations/0002_claim_chain_anchors.sql:/docker-entrypoint-initdb.d/0002_anchors.sql:ro
      - ./migrations/0003_admin_audit_log.sql:/docker-entrypoint-initdb.d/0003_audit.sql:ro
      - ./migrations/0004_platform_policies.sql:/docker-entrypoint-initdb.d/0004_platforms.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d insurancegovernor"]
      interval: 3s
      retries: 10

  ig-pgbouncer:
    image: edoburu/pgbouncer:1.22.1-p0
    volumes:
      - ./config/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./config/pgbouncer-userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "6433:6432"
    depends_on:
      ig-postgres:
        condition: service_healthy

  ig-redis:
    image: redis:7
    ports:
      - "6382:6379"

  ig-sidecar:
    build:
      context: ..
      dockerfile: insurance-governor/spine/sidecar/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@ig-pgbouncer:6432/insurancegovernor
      REDIS_URL: redis://ig-redis:6379/0
      IG_INTERNAL_TOKENS: ${IG_INTERNAL_TOKENS:-dev-ig-spine-token-change-me}
      DB_POOL_SIZE: 3
      DB_MAX_OVERFLOW: 2
    ports:
      - "8101:8101"
    depends_on:
      - ig-pgbouncer
      - ig-redis

  ig-reconciler:
    build:
      context: ..
      dockerfile: insurance-governor/spine/reconciler/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@ig-pgbouncer:6432/insurancegovernor
      REDIS_URL: redis://ig-redis:6379/0
      RECONCILER_HEALTH_PORT: 8102
    ports:
      - "8102:8102"
    depends_on:
      - ig-pgbouncer
      - ig-redis

  ig-gateway:
    build:
      context: ..
      dockerfile: insurance-governor/spine/gateway/Dockerfile
    environment:
      IG_SIDECAR_URL: http://ig-sidecar:8101
      IG_INTERNAL_TOKEN: ${IG_INTERNAL_TOKENS:-dev-ig-spine-token-change-me}
    ports:
      - "8100:8100"
    depends_on:
      - ig-sidecar

volumes:
  ig_ha_postgres:
