# Canonical container images for promotion — keep in sync with CI build-images jobs.
version: 1

governors:
  modelgovernor:
    helm_chart: deploy/helm/modelgovernor
    helm_values_style: split  # images.<key>.repository + tag
    build_context: .
    images:
      - key: sidecar
        name: modelgovernor/sidecar
        dockerfile: sidecar/Dockerfile
      - key: reconciler
        name: modelgovernor/reconciler
        dockerfile: reconciler/Dockerfile
      - key: gateway
        name: modelgovernor/gateway
        dockerfile: gateway/Dockerfile

  finance-governor:
    helm_chart: finance-governor/deploy/helm/finance-governor
    helm_values_style: combined  # image.<key> as repo:tag
    build_context: .
    images:
      - key: sidecar
        name: finance-governor/sidecar
        dockerfile: finance-governor/spine/sidecar/Dockerfile
      - key: reconciler
        name: finance-governor/reconciler
        dockerfile: finance-governor/spine/reconciler/Dockerfile
      - key: gateway
        name: finance-governor/gateway
        dockerfile: finance-governor/spine/gateway/Dockerfile
      - key: wirematch
        name: finance-governor/wirematch
        dockerfile: finance-governor/platforms/wire_match/Dockerfile
      - key: algofreeze
        name: finance-governor/algofreeze
        dockerfile: finance-governor/platforms/algofreeze/Dockerfile
      - key: subledger
