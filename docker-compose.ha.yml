# Production HA rehearsal stack for Finance Ops Finals.
#
# Adds PgBouncer transaction pooling, multiple sidecar replicas, and a
# reconciler daemon with Postgres advisory-lock leader election.
#
# Usage:
#   docker compose -f docker-compose.ha.yml up -d --scale sidecar=3 --scale reconciler=2
#   curl http://localhost:8081/readyz
#   curl http://localhost:8082/healthz

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-modelgovernor}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_ha_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d modelgovernor"]
      interval: 3s
      timeout: 5s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:1.22.1-p0
    volumes:
      - ./config/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./config/pgbouncer-userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  sidecar:
    build:
      context: .
      dockerfile: sidecar/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@pgbouncer:6432/modelgovernor
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SIDECAR_INTERNAL_TOKENS: ${SIDECAR_INTERNAL_TOKENS:-dev-token}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-3}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-2}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-5}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-900}
    depends_on:
      - pgbouncer
      - redis
    ports:
      - "8081:8081"

  reconciler:
    build:
      context: .
      dockerfile: reconciler/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@pgbouncer:6432/modelgovernor
      RECONCILER_MODE: daemon
      SWEEP_INTERVAL_SECONDS: ${SWEEP_INTERVAL_SECONDS:-30}
      DB_POOL_SIZE: 2
      DB_MAX_OVERFLOW: 1
    depends_on:
      - pgbouncer
    ports:
      - "8082:8082"

volumes:
  postgres_ha_data:
