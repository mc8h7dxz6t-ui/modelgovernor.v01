name: Image Promotion

on:
  workflow_dispatch:
    inputs:
      governor:
        description: Governor images to promote
        required: true
        default: mg
        type: choice
        options:
          - mg
          - fg
          - ig
          - cg
          - all
      environment:
        description: Promotion environment tag prefix
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      push:
        description: Push images to GHCR (requires packages:write)
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  preflight:
    name: Manifest + promotion plan
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.plan.outputs.registry }}
      immutable_tag: ${{ steps.plan.outputs.immutable_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate manifest and emit plan
        id: plan
        env:
          IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
          PROMOTION_ENV: ${{ inputs.environment }}
          GIT_SHA: ${{ github.sha }}
        run: |
          chmod +x scripts/promote-images.sh
          PYTHONPATH=governor-spine-core python3 -m pytest governor-spine-core/tests/test_image_promotion.py -q
          ./scripts/promote-images.sh "${{ inputs.governor }}" \
            --environment "${{ inputs.environment }}" \
            --dry-run
          IMMUTABLE=$(python3 -c "import json; print(json.load(open('artifacts/image-promotion/promotion-plan.json'))['immutable_tag'])")
          echo "immutable_tag=$IMMUTABLE" >> "$GITHUB_OUTPUT"
          echo "registry=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Upload promotion plan
        uses: actions/upload-artifact@v4
        with:
          name: image-promotion-plan
          path: artifacts/image-promotion/

  build:
    name: Build images (${{ inputs.governor }})
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Build container images
        env:
          IMAGE_REGISTRY: ${{ needs.preflight.outputs.registry }}
          PROMOTION_ENV: ${{ inputs.environment }}
          GIT_SHA: ${{ github.sha }}
        run: |
          chmod +x scripts/promote-images.sh
          ./scripts/promote-images.sh "${{ inputs.governor }}" --environment "${{ inputs.environment }}"

  push:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: [preflight, build]
    if: inputs.push == true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push promoted images
        env:
          IMAGE_REGISTRY: ${{ needs.preflight.outputs.registry }}
          PROMOTION_ENV: ${{ inputs.environment }}
          GIT_SHA: ${{ github.sha }}
        run: |
          chmod +x scripts/promote-images.sh
          ./scripts/promote-images.sh "${{ inputs.governor }}" \
            --environment "${{ inputs.environment }}" \
            --push

      - name: Record promotion metadata
        run: |
          echo "## Image promotion" >> "$GITHUB_STEP_SUMMARY"
          echo "- Governor: \`${{ inputs.governor }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: \`${{ inputs.environment }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Immutable tag: \`${{ needs.preflight.outputs.immutable_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Registry: \`${{ needs.preflight.outputs.registry }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Deploy with Helm overlay from \`artifacts/image-promotion/*-${{ inputs.environment }}-images.yaml\`" >> "$GITHUB_STEP_SUMMARY"

  helm-verify:
    name: Helm render with promoted tags
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Download promotion plan
        uses: actions/download-artifact@v4
        with:
          name: image-promotion-plan
          path: artifacts/image-promotion

      - name: Render MG chart with promotion overlay
        if: inputs.governor == 'mg' || inputs.governor == 'all'
        run: |
          helm template mg deploy/helm/modelgovernor \
            -f deploy/helm/modelgovernor/values-production.yaml \
            -f artifacts/image-promotion/modelgovernor-${{ inputs.environment }}-images.yaml \
            --set secrets.create=true \
            | grep -E "image: ghcr.io" | head -5

      - name: Render FG chart with promotion overlay
        if: inputs.governor == 'fg' || inputs.governor == 'all'
        run: |
          helm template fg finance-governor/deploy/helm/finance-governor \
            -f finance-governor/deploy/helm/finance-governor/values-production.yaml \
            -f artifacts/image-promotion/finance-governor-${{ inputs.environment }}-images.yaml \
            --set secrets.create=true \
            | grep -E "image: ghcr.io" | head -5
