name: Promote

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target overlay to validate
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

jobs:
  tier1-tier3:
    name: Tier 1–3 promotion tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r sidecar/requirements.txt -r reconciler/requirements.txt
          pip install pytest hypothesis

      - name: Tier 1
        run: |
          PYTHONPATH=. pytest \
            tests/integration/test_ledger_hardening.py \
            tests/integration/test_phase4_anomaly.py \
            tests/programs/finance_ops_finals/ \
            tests/programs/cost_attribution_accountability/ \
            -q

      - name: Tier 3 load harness
        run: PYTHONPATH=. python3 tests/load/test_load_harness.py

  tier2-postgres:
    name: Tier 2 Postgres gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mg_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r sidecar/requirements.txt -r reconciler/requirements.txt
          pip install pytest

      - name: Tier 2 Postgres vigorous
        env:
          POSTGRES_TEST_URL: postgresql+psycopg://postgres:postgres@localhost:5432/mg_test
        run: |
          PYTHONPATH=. pytest tests/integration/test_postgres_vigorous.py \
            tests/programs/finance_ops_finals/test_reconciler_leader_election.py -q

  manifests:
    name: Kustomize render + dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -sSLo kustomize.tar.gz \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.5.0/kustomize_v5.5.0_linux_amd64.tar.gz
          tar xzf kustomize.tar.gz && sudo mv kustomize /usr/local/bin/kustomize

      - name: Stage migrations for kustomize bundle
        run: |
          mkdir -p deploy/base/migrations
          cp migrations/*.sql deploy/base/migrations/

      - name: Render overlay
        run: kustomize build deploy/overlays/${{ inputs.environment }} > /tmp/rendered.yaml

      - name: kubectl dry-run client validation
        run: kubectl apply --dry-run=client -f /tmp/rendered.yaml
