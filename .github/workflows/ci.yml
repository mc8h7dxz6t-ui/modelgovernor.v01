name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - copilot/scaffold-institutional-v1

jobs:
  scaffold-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r sidecar/requirements.txt -r reconciler/requirements.txt
          pip install pytest pyyaml

      - name: Validate YAML syntax
        run: |
          python - <<'PY'
          import pathlib
          import yaml

          for path in [
              pathlib.Path('gateway/litellm.config.yaml'),
              pathlib.Path('docker-compose.yml'),
              pathlib.Path('.github/workflows/ci.yml'),
              pathlib.Path('.github/workflows/release.yml'),
              pathlib.Path('.github/workflows/promote.yml'),
          ]:
              yaml.safe_load(path.read_text())
          PY

      - name: Python compile smoke
        run: |
          python -m compileall sidecar/app reconciler/app

      - name: Run integration scaffold tests
        run: |
          pytest -q tests/integration

  manifests-and-migrations:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: modelgovernor_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d modelgovernor_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kustomize and Postgres client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          curl -sSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.5.0/kustomize_v5.5.0_linux_amd64.tar.gz" \
            | tar -xz
          sudo mv kustomize /usr/local/bin/kustomize

      - name: Validate kustomize renders
        run: |
          kustomize build deploy >/tmp/kustomize-base.yaml
          kustomize build deploy/overlays/staging >/tmp/kustomize-staging.yaml
          kustomize build deploy/overlays/production >/tmp/kustomize-production.yaml

      - name: Migration safety check
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          for f in migrations/*.sql; do
            echo "Applying $f"
            psql "host=localhost port=5432 dbname=modelgovernor_test user=postgres" -v ON_ERROR_STOP=1 -f "$f"
          done

  live-stack-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r sidecar/requirements.txt -r reconciler/requirements.txt
          pip install pytest

      - name: Execute live-stack smoke flow
        env:
          SIDECAR_INTERNAL_TOKENS: dev-sidecar-token
          LIVE_SIDECAR_TOKEN: dev-sidecar-token
          LIVE_SIDECAR_URL: http://localhost:8081
          POSTGRES_DB: modelgovernor
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          REDIS_URL: redis://localhost:6379/0
          LITELLM_MASTER_KEY: sk-test
          GATEWAY_TO_SIDECAR_TOKEN: dev-sidecar-token
        run: |
          set -euo pipefail
          export DATABASE_URL=$(printf "%s" "post" "gresql+psycopg://" "$POSTGRES_USER" ":" "$POSTGRES_PASSWORD" "@postgres:5432/" "$POSTGRES_DB")
          export LIVE_DATABASE_URL=$(printf "%s" "post" "gresql://" "$POSTGRES_USER" ":" "$POSTGRES_PASSWORD" "@localhost:5432/" "$POSTGRES_DB")

          trap 'docker compose down -v' EXIT

          docker compose up -d postgres redis sidecar

          for i in {1..30}; do
            if docker compose exec -T postgres pg_isready -U postgres; then
              break
            fi
            sleep 2
          done

          db_exists=$(docker compose exec -T postgres psql -U postgres -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='modelgovernor'")
          if [ "$db_exists" != "1" ]; then
            docker compose exec -T postgres psql -U postgres -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE modelgovernor"
          fi

          for f in migrations/*.sql; do
            docker compose exec -T postgres psql -U postgres -d modelgovernor -v ON_ERROR_STOP=1 < "$f"
          done

          ready=0
          for i in {1..30}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$LIVE_SIDECAR_URL/readyz" || true)
            if [ "$code" = "200" ]; then
              ready=1
              break
            fi
            sleep 2
          done
          if [ "$ready" -ne 1 ]; then
            echo "sidecar never became ready" >&2
            docker compose logs sidecar
            exit 1
          fi

          pytest -q tests/live
