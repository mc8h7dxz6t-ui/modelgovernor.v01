name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # Fast correctness tests — always run, no external services required
  # ---------------------------------------------------------------------------
  test-tier1:
    name: Tier 1 — SQLite fast tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r sidecar/requirements.txt
          pip install -r reconciler/requirements.txt
          pip install pytest

      - name: Compile check
        run: python -m compileall -q sidecar/app reconciler/app

      - name: Tier 1 — integration tests (SQLite, no infra)
        run: |
          PYTHONPATH=. pytest \
            tests/integration/test_ledger_hardening.py \
            tests/integration/test_phase3_reconciliation.py \
            tests/integration/test_phase4_anomaly.py \
            tests/integration/test_phase4_reporting.py \
            tests/integration/test_orchestration_plane.py \
            -q

  # ---------------------------------------------------------------------------
  # Postgres-backed vigorous proof tests
  # ---------------------------------------------------------------------------
  test-tier2:
    name: Tier 2 — Postgres vigorous tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mg_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r sidecar/requirements.txt
          pip install -r reconciler/requirements.txt
          pip install pytest psycopg2-binary

      - name: Tier 2 — Postgres vigorous tests
        env:
          POSTGRES_TEST_URL: ******localhost:5432/mg_test
        run: PYTHONPATH=. pytest tests/integration/test_postgres_vigorous.py -q

  # ---------------------------------------------------------------------------
  # Load-harness gate — SQLite-based invariant safety proof
  # ---------------------------------------------------------------------------
  test-load:
    name: Tier 3 — Load harness
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r sidecar/requirements.txt
          pip install -r reconciler/requirements.txt
          pip install pytest

      - name: Tier 3 — load harness
        run: PYTHONPATH=. pytest tests/load/test_load_harness.py -q

      - name: Validate load harness report invariants
        run: |
          python - <<'EOF'
          import json
          from pathlib import Path

          reports = sorted(Path("tests/load/reports").glob("load_report_*.json"))
          if not reports:
              raise RuntimeError("No load report artifact generated")
          report = json.loads(reports[-1].read_text())
          for scenario in report.get("scenarios", []):
              violations = int(scenario.get("invariant_violations", 0))
              if violations != 0:
                  raise RuntimeError(
                      f"{scenario.get('scenario')} invariant_violations={violations}"
                  )
          print(f"Validated report: {reports[-1]}")
          EOF

      - name: Upload load report artifact
        uses: actions/upload-artifact@v4
        with:
          name: load-harness-report
          path: tests/load/reports/load_report_*.json
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Kubernetes manifest validation — renders all overlays with kustomize
  # ---------------------------------------------------------------------------
  validate-manifests:
    name: Kustomize manifest validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -sSLo kustomize.tar.gz \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.5.0/kustomize_v5.5.0_linux_amd64.tar.gz
          tar xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/kustomize
          kustomize version

      - name: Render staging overlay
        run: kustomize build deploy/overlays/staging

      - name: Render production overlay
        run: kustomize build deploy/overlays/production

  # ---------------------------------------------------------------------------
  # Migration sanity check — ensures all SQL files parse without error
  # ---------------------------------------------------------------------------
  validate-migrations:
    name: Migration syntax check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SQLAlchemy
        run: pip install sqlalchemy

      - name: Apply all migrations against SQLite
        run: |
          python - <<'EOF'
          import sqlite3, pathlib

          migrations_dir = pathlib.Path("migrations")
          conn = sqlite3.connect(":memory:")

          # SQLite does not support ALTER TYPE or Postgres-specific DDL; skip those
          # statements gracefully — the point is to catch syntax errors in the portable
          # DDL that both dialects share.
          skip_prefixes = (
              "alter type",
              "create extension",
              "comment on",
              "create type",
          )

          for path in sorted(migrations_dir.glob("*.sql")):
              sql = path.read_text()
              for stmt in sql.split(";"):
                  stripped = stmt.strip().lower()
                  if not stripped:
                      continue
                  if any(stripped.startswith(p) for p in skip_prefixes):
                      continue
                  try:
                      conn.execute(stmt)
                  except sqlite3.OperationalError as exc:
                      # Ignore expected Postgres-only DDL and SQL fragments that
                      # SQLite rejects; the purpose of this check is to catch
                      # accidental syntax regressions in the portable subset.
                      msg = f"{stmt}\n{exc}".lower()
                      known_incompatible = (
                          "timestamptz", "jsonb", "bigserial", "for update",
                          "skip locked", "returning", "::jsonb", "::text",
                          "filter (where", "if not exists", "create type",
                          "alter type", "include (",
                      )
                      if not any(k in msg for k in known_incompatible):
                          raise RuntimeError(f"{path.name}: {exc}\nStatement: {stmt[:200]}") from exc

          print("All migration files parsed successfully.")
          EOF
