name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - copilot/scaffold-institutional-v1

jobs:
  scaffold-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r sidecar/requirements.txt -r reconciler/requirements.txt
          pip install pytest pyyaml

      - name: Validate YAML syntax
        run: |
          python - <<'PY'
          import pathlib
          import yaml

          for path in [
              pathlib.Path('gateway/litellm.config.yaml'),
              pathlib.Path('docker-compose.yml'),
              pathlib.Path('.github/workflows/ci.yml'),
          ]:
              yaml.safe_load(path.read_text())
          PY

      - name: Python compile smoke
        run: |
          python -m compileall sidecar/app reconciler/app

      - name: Run integration scaffold tests
        run: |
          pytest -q tests/integration
