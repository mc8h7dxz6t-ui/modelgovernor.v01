name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-tier1:
    name: Tier 1 — SQLite fast tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r sidecar/requirements.txt
          pip install -r reconciler/requirements.txt
          pip install -r gateway/requirements.txt
          pip install pytest hypothesis fakeredis

      - name: Compile check
        run: python3 -m compileall -q sidecar/app reconciler/app gateway/app

      - name: Tier 1 integration tests
        run: |
          PYTHONPATH=. pytest \
            tests/integration/test_ledger_hardening.py \
            tests/integration/test_sidecar_admin_observability.py \
            tests/integration/test_phase4_anomaly.py \
            tests/integration/test_readiness.py \
            tests/integration/test_fallback_limiter.py \
            tests/integration/test_diagnostic_mode.py \
            tests/integration/test_auth_oidc.py \
            tests/integration/test_ledger_verify_chain.py \
            tests/integration/test_diagnostic_write_block.py \
            tests/integration/test_circuit_breaker_local_fallback.py \
            tests/integration/test_admin_audit.py \
            tests/integration/test_oidc_jwks_live.py \
            tests/integration/test_ledger_anchor_s3.py \
            tests/integration/test_micro_token_precision.py \
            tests/integration/test_guardrails.py \
            tests/integration/test_prometheus_scrape.py \
            tests/integration/test_circuit_breaker.py \
            tests/integration/test_operations_list.py \
            tests/integration/test_gateway_governance.py \
            tests/integration/test_gateway_openai_compat.py \
            tests/integration/test_gateway_provider_router.py \
            tests/integration/test_chaos_resilience.py \
            tests/integration/test_property_ledger.py \
            tests/integration/test_migration_invariants.py \
            tests/programs/finance_ops_finals/ \
            tests/programs/cost_attribution_accountability/ \
            -q

  test-tier2:
    name: Tier 2 — Postgres vigorous tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mg_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r sidecar/requirements.txt
          pip install -r reconciler/requirements.txt
          pip install pytest

      - name: Tier 2 Postgres vigorous tests
        env:
          POSTGRES_TEST_URL: postgresql+psycopg://postgres:postgres@localhost:5432/mg_test
        run: PYTHONPATH=. pytest tests/integration/test_postgres_vigorous.py tests/integration/test_postgres_reliability.py tests/integration/test_migration_invariants.py tests/programs/finance_ops_finals/test_reconciler_leader_election.py -q

  validate-manifests:
    name: Kustomize manifest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -sSLo kustomize.tar.gz \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.5.0/kustomize_v5.5.0_linux_amd64.tar.gz
          tar xzf kustomize.tar.gz && sudo mv kustomize /usr/local/bin/kustomize

      - name: Stage migrations for kustomize bundle
        run: |
          mkdir -p deploy/base/migrations
          cp migrations/*.sql deploy/base/migrations/
          mkdir -p deploy/helm/modelgovernor/files/migrations
          cp migrations/*.sql deploy/helm/modelgovernor/files/migrations/

      - name: Render staging overlay
        run: kustomize build deploy/overlays/staging > /tmp/staging.yaml

      - name: Render production overlay
        run: kustomize build deploy/overlays/production > /tmp/production.yaml

      - name: Validate rendered YAML is well-formed
        run: |
          pip install pyyaml
          python3 <<'EOF'
          import yaml
          for path in ("/tmp/staging.yaml", "/tmp/production.yaml"):
              docs = [doc for doc in yaml.safe_load_all(open(path)) if doc]
              kinds = {doc.get("kind") for doc in docs}
              print(f"{path}: {len(docs)} manifests, kinds={sorted(k for k in kinds if k)}")
              assert "Deployment" in kinds, f"missing Deployment in {path}"
          EOF

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm template production values
        run: |
          helm template modelgovernor deploy/helm/modelgovernor \
            -f deploy/helm/modelgovernor/values-production.yaml \
            --namespace modelgovernor > /tmp/helm-production.yaml
          wc -l /tmp/helm-production.yaml

      - name: Helm lint
        run: helm lint deploy/helm/modelgovernor -f deploy/helm/modelgovernor/values-production.yaml

      - name: Validate ArgoCD Application manifests
        run: |
          pip install pyyaml
          python3 <<'EOF'
          import yaml
          for path in ("deploy/argocd/appproject.yaml", "deploy/argocd/application-production.yaml"):
              list(yaml.safe_load_all(open(path)))
          print("ArgoCD manifests OK")
          EOF

  test-tier3:
    name: Tier 3 — Load harness gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r sidecar/requirements.txt
          pip install -r reconciler/requirements.txt
          pip install pytest

      - name: Tier 3 load harness
        env:
          LOAD_WORKERS: 12
          LOAD_OPS_PER_WORKER: 8
        run: |
          PYTHONPATH=. pytest tests/load/test_load_harness.py -q
          PYTHONPATH=. python3 tests/load/test_load_harness.py

      - name: Validate zero invariant violations in report
        run: |
          python3 - <<'EOF'
          import json
          from pathlib import Path

          reports = sorted(Path("tests/load/reports").glob("load_report_*.json"))
          if not reports:
              raise SystemExit("No load report artifact generated")
          report = json.loads(reports[-1].read_text())
          for scenario in report.get("scenarios", []):
              violations = int(scenario.get("invariant_violations", 0))
              if violations:
                  raise SystemExit(f"{scenario.get('scenario')} invariant_violations={violations}")
          print(f"Validated: {reports[-1]}")
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: load-harness-report
          path: tests/load/reports/load_report_*.json
          if-no-files-found: error

  validate-migrations:
    name: Migration invariant definitions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest sqlalchemy psycopg[binary]

      - name: Verify invariant migration present
        run: PYTHONPATH=. python3 -m pytest tests/integration/test_migration_invariants.py::test_invariant_migration_file_present -q

  test-tier4-chaos:
    name: Tier 4 — Toxiproxy chaos (Finance Ops)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r sidecar/requirements.txt
          pip install -r reconciler/requirements.txt
          pip install pytest requests

      - name: Start toxiproxy chaos stack
        run: |
          docker compose -f docker-compose.chaos.yml up -d --wait postgres-chaos toxiproxy
          docker compose -f docker-compose.chaos.yml run --rm toxiproxy-config

      - name: Tier 4 toxiproxy finance ops tests
        env:
          POSTGRES_TEST_URL: postgresql+psycopg://postgres:postgres@localhost:5435/mg_chaos
          TOXIPROXY_API: http://localhost:8474
        run: PYTHONPATH=. python3 -m pytest tests/chaos/test_toxiproxy_finance_ops.py -q

      - name: Tear down chaos stack
        if: always()
        run: docker compose -f docker-compose.chaos.yml down -v

  build-images:
    name: Container image build gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sidecar, reconciler, gateway images
        run: |
          docker build -f sidecar/Dockerfile -t modelgovernor/sidecar:ci .
          docker build -f reconciler/Dockerfile -t modelgovernor/reconciler:ci .
          docker build -f gateway/Dockerfile -t modelgovernor/gateway:ci .

  ig-test-tier1:
    name: IG Tier 1 — SQLite spine tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install IG sidecar dependencies
        run: pip install -r insurance-governor/spine/sidecar/requirements.txt pytest httpx
      - name: Tier 1 insurance governor tests
        run: make ig-spine-test

  ig-test-tier2:
    name: IG Tier 2 — Postgres vigorous
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ig_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r insurance-governor/spine/sidecar/requirements.txt
          pip install -r insurance-governor/spine/reconciler/requirements.txt
          pip install pytest
      - name: Apply IG migrations
        env:
          PGPASSWORD: postgres
        run: |
          for f in insurance-governor/migrations/*.sql; do
            psql -h localhost -U postgres -d ig_test -f "$f"
          done
      - name: Tier 2 Postgres tests
        env:
          POSTGRES_TEST_URL: postgresql+psycopg://postgres:postgres@localhost:5432/ig_test
        run: |
          PYTHONPATH=insurance-governor/spine/sidecar pytest \
            insurance-governor/tests/test_postgres_vigorous.py \
            insurance-governor/tests/test_postgres_reliability.py \
            insurance-governor/tests/test_migration_invariants.py \
            -q

  ig-validate-migrations:
    name: IG migration invariant definitions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify IG migration bundle
        run: PYTHONPATH=insurance-governor/spine/sidecar pytest insurance-governor/tests/test_migration_invariants.py -q

  ig-test-tier3:
    name: IG Tier 3 — Load harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r insurance-governor/spine/sidecar/requirements.txt pytest
      - name: Load harness
        env:
          LOAD_WORKERS: 8
          LOAD_OPS_PER_WORKER: 5
        run: make ig-load-test

      - name: Validate zero invariant violations in load report
        run: |
          python3 - <<'EOF'
          import json
          from pathlib import Path
          reports = sorted(Path("insurance-governor/tests/load/load/reports").glob("crystallize_commit_*.json"))
          if not reports:
              raise SystemExit("No IG load report artifact generated")
          report = json.loads(reports[-1].read_text())
          violations = int(report.get("invariant_violations", 0))
          if violations:
              raise SystemExit(f"invariant_violations={violations}")
          print(f"Validated: {reports[-1]}")
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: ig-load-harness-report
          path: insurance-governor/tests/load/load/reports/crystallize_commit_*.json
          if-no-files-found: error

  ig-validate-helm:
    name: IG Helm chart lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Helm lint insurancegovernor
        run: helm lint deploy/helm/insurancegovernor -f deploy/helm/insurancegovernor/values-production.yaml
      - name: Helm template production values
        run: |
          helm template insurancegovernor deploy/helm/insurancegovernor \
            -f deploy/helm/insurancegovernor/values-production.yaml \
            --namespace insurancegovernor > /tmp/ig-helm-production.yaml
          wc -l /tmp/ig-helm-production.yaml

  ig-build-images:
    name: IG container image build gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build IG spine images
        run: |
          docker build -f insurance-governor/spine/sidecar/Dockerfile -t insurancegovernor/sidecar:ci .
          docker build -f insurance-governor/spine/reconciler/Dockerfile -t insurancegovernor/reconciler:ci .
          docker build -f insurance-governor/spine/gateway/Dockerfile -t insurancegovernor/gateway:ci .
          docker build -f insurance-governor/platforms/claim_gate/Dockerfile -t insurancegovernor/claim-gate:ci .

  ig-test-tier4-chaos:
    name: IG Tier 4 — Toxiproxy chaos (claim ops)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r insurance-governor/spine/sidecar/requirements.txt
          pip install pytest requests

      - name: Start IG toxiproxy chaos stack
        run: |
          docker compose -f insurance-governor/docker-compose.chaos.yml up -d --wait ig-postgres-chaos toxiproxy
          docker compose -f insurance-governor/docker-compose.chaos.yml run --rm toxiproxy-config

      - name: Tier 4 toxiproxy claim ops tests
        env:
          POSTGRES_TEST_URL: postgresql+psycopg://postgres:postgres@localhost:5436/ig_chaos
          TOXIPROXY_API: http://localhost:8475
        run: PYTHONPATH=insurance-governor/spine/sidecar pytest insurance-governor/tests/chaos/test_toxiproxy_claim_ops.py -q

      - name: Tear down chaos stack
        if: always()
        run: docker compose -f insurance-governor/docker-compose.chaos.yml down -v
