name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # Fast correctness tests — always run, no external services required
  # ---------------------------------------------------------------------------
  test-tier1:
    name: Tier 1 — SQLite fast tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r sidecar/requirements.txt
          pip install -r reconciler/requirements.txt
          pip install pytest

      - name: Compile check
        run: python -m compileall -q sidecar/app reconciler/app

      - name: Tier 1 — integration tests (SQLite, no infra)
        run: |
          PYTHONPATH=. pytest \
            tests/integration/test_ledger_hardening.py \
            tests/integration/test_phase3_reconciliation.py \
            tests/integration/test_phase4_anomaly.py \
            tests/integration/test_phase4_reporting.py \
            tests/integration/test_orchestration_plane.py \
            -q

  # ---------------------------------------------------------------------------
  # Postgres-backed vigorous proof tests
  # ---------------------------------------------------------------------------
  test-tier2:
    name: Tier 2 — Postgres vigorous tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mg_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r sidecar/requirements.txt
          pip install -r reconciler/requirements.txt
          pip install pytest psycopg2-binary

      - name: Tier 2 — Postgres vigorous tests
        env:
          POSTGRES_TEST_URL: ******localhost:5432/mg_test
        run: PYTHONPATH=. pytest tests/integration/test_postgres_vigorous.py -q

  # ---------------------------------------------------------------------------
  # Load-harness gate — SQLite-based invariant safety proof
  # ---------------------------------------------------------------------------
  test-load:
    name: Tier 3 — Load harness
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r sidecar/requirements.txt
          pip install -r reconciler/requirements.txt
          pip install pytest

      - name: Tier 3 — load harness
        run: PYTHONPATH=. pytest tests/load/test_load_harness.py -q

      - name: Validate load harness report invariants
        run: |
          python - <<'EOF'
          import json
          from pathlib import Path

          reports = sorted(Path("tests/load/reports").glob("load_report_*.json"))
          if not reports:
              raise RuntimeError("No load report artifact generated")
          report = json.loads(reports[-1].read_text())
          for scenario in report.get("scenarios", []):
              violations = int(scenario.get("invariant_violations", 0))
              if violations != 0:
                  raise RuntimeError(
                      f"{scenario.get('scenario')} invariant_violations={violations}"
                  )
          print(f"Validated report: {reports[-1]}")
          EOF

      - name: Upload load report artifact
        uses: actions/upload-artifact@v4
        with:
          name: load-harness-report
          path: tests/load/reports/load_report_*.json
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Kubernetes manifest validation — renders all overlays with kustomize
  # ---------------------------------------------------------------------------
  validate-manifests:
    name: Kustomize manifest validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -sSLo kustomize.tar.gz \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.5.0/kustomize_v5.5.0_linux_amd64.tar.gz
          tar xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/kustomize
          kustomize version

      - name: Render staging overlay
        run: kustomize build deploy/overlays/staging

      - name: Render production overlay
        run: kustomize build deploy/overlays/production

  # ---------------------------------------------------------------------------
  # Migration sanity check — ensures all SQL files parse without error
  # ---------------------------------------------------------------------------
  validate-migrations:
    name: Migration syntax check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SQLAlchemy
        run: pip install sqlalchemy

      - name: Apply all migrations against SQLite
        run: |
          python - <<'EOF'
          import pathlib
          import re
          import sqlite3

          migrations_dir = pathlib.Path("migrations")
          conn = sqlite3.connect(":memory:")

          skip_prefixes = (
              "alter type",
              "create extension",
              "comment on",
              "create type",
          )

          def iter_statements(sql: str):
              buffer: list[str] = []
              for line in sql.splitlines():
                  buffer.append(line)
                  candidate = "\n".join(buffer).strip()
                  if candidate and sqlite3.complete_statement(candidate):
                      yield candidate
                      buffer = []

              candidate = "\n".join(buffer).strip()
              if candidate:
                  yield candidate

          def normalize_statement(stmt: str) -> list[str]:
              stripped = stmt.strip().rstrip(";")
              if not stripped:
                  return []

              lowered = stripped.lower()
              if any(lowered.startswith(prefix) for prefix in skip_prefixes):
                  return []

              if lowered.startswith("alter table") and (
                  "drop constraint" in lowered or "add constraint" in lowered
              ):
                  return []

              normalized = stripped
              normalized = re.sub(r"\btimestamptz\b", "TEXT", normalized, flags=re.IGNORECASE)
              normalized = re.sub(r"\bbigserial\b", "INTEGER", normalized, flags=re.IGNORECASE)
              normalized = re.sub(r"\bjsonb\b", "TEXT", normalized, flags=re.IGNORECASE)
              normalized = re.sub(r"'\\{\\}'::jsonb", "'{}'", normalized, flags=re.IGNORECASE)
              normalized = re.sub(r"::text\b", "", normalized, flags=re.IGNORECASE)
              normalized = re.sub(r"\bescrow_status\b", "TEXT", normalized, flags=re.IGNORECASE)
              normalized = re.sub(
                  r"\s+include\s*\([^)]+\)",
                  "",
                  normalized,
                  flags=re.IGNORECASE | re.DOTALL,
              )
              normalized = re.sub(
                  r"add column if not exists",
                  "ADD COLUMN",
                  normalized,
                  flags=re.IGNORECASE,
              )

              if lowered.startswith("alter table") and "add column" in lowered:
                  match = re.match(
                      r"ALTER TABLE\s+([^\s]+)\s+(.*)",
                      normalized,
                      flags=re.IGNORECASE | re.DOTALL,
                  )
                  if not match:
                      return [normalized]
                  table_name, operations = match.groups()
                  return [
                      f"ALTER TABLE {table_name} {operation.strip()}"
                      for operation in re.split(
                          r",\s*(?=ADD COLUMN\b)",
                          operations,
                          flags=re.IGNORECASE,
                      )
                      if operation.strip()
                  ]

              return [normalized]

          for path in sorted(migrations_dir.glob("*.sql")):
              for stmt in iter_statements(path.read_text()):
                  for normalized in normalize_statement(stmt):
                      try:
                          conn.execute(normalized)
                      except sqlite3.OperationalError as exc:
                          raise RuntimeError(
                              f"{path.name}: {exc}\nStatement: {normalized[:200]}"
                          ) from exc

          print("All migration files parsed successfully.")
          EOF
