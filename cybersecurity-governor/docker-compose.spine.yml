# Cybersecurity Governor spine only (no platforms)
# Usage: docker compose -f docker-compose.spine.yml up --build

services:
  ig-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cybersecuritygovernor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - ./migrations/0001_cg_spine_init.sql:/docker-entrypoint-initdb.d/0001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cybersecuritygovernor"]
      interval: 5s
      timeout: 5s
      retries: 5

  ig-redis:
    image: redis:7
    ports:
      - "6381:6379"

  ig-sidecar:
    build:
      context: ..
      dockerfile: cybersecurity-governor/spine/sidecar/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@ig-postgres:5432/cybersecuritygovernor
      REDIS_URL: redis://ig-redis:6379/0
      CG_INTERNAL_TOKENS: dev-cg-spine-token-change-me
    ports:
      - "8101:8121"
    depends_on:
      ig-postgres:
        condition: service_healthy

  ig-reconciler:
    build:
      context: ..
      dockerfile: cybersecurity-governor/spine/reconciler/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@ig-postgres:5432/cybersecuritygovernor
      REDIS_URL: redis://ig-redis:6379/0
      RECONCILER_HEALTH_PORT: 8102
    ports:
      - "8102:8122"
    depends_on:
      ig-postgres:
        condition: service_healthy

  ig-gateway:
    build:
      context: ..
      dockerfile: cybersecurity-governor/spine/gateway/Dockerfile
    environment:
      CG_SIDECAR_URL: http://ig-sidecar:8121
      CG_INTERNAL_TOKEN: dev-cg-spine-token-change-me
    ports:
      - "8100:8120"
    depends_on:
      - ig-sidecar
