# Cybersecurity Governor — spine + six enforcement platforms
# Build context: repository root (parent of cybersecurity-governor/)

services:
  cg-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cybersecuritygovernor}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5434:5432"
    volumes:
      - cg_postgres_data:/var/lib/postgresql/data
      - ./migrations/0001_cg_spine_init.sql:/docker-entrypoint-initdb.d/0001_init.sql:ro
      - ./migrations/0002_security_chain_anchors.sql:/docker-entrypoint-initdb.d/0002_anchors.sql:ro
      - ./migrations/0003_admin_audit_log.sql:/docker-entrypoint-initdb.d/0003_audit.sql:ro
      - ./migrations/0004_cg_platforms_mesh.sql:/docker-entrypoint-initdb.d/0004_mesh.sql:ro
      - ./migrations/0005_cg_production_state.sql:/docker-entrypoint-initdb.d/0005_state.sql:ro
      - ./migrations/0007_sales_sku_platforms.sql:/docker-entrypoint-initdb.d/0007_sales_skus.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cybersecuritygovernor"]
      interval: 5s
      timeout: 5s
      retries: 5

  cg-redis:
    image: redis:7
    ports:
      - "6381:6379"

  cg-sidecar:
    build:
      context: ..
      dockerfile: cybersecurity-governor/spine/sidecar/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@cg-postgres:5432/cybersecuritygovernor
      REDIS_URL: redis://cg-redis:6379/0
      CG_INTERNAL_TOKENS: ${CG_INTERNAL_TOKENS:-dev-cg-spine-token-change-me}
    ports:
      - "8121:8121"
    depends_on:
      cg-postgres:
        condition: service_healthy
      cg-redis:
        condition: service_started

  cg-reconciler:
    build:
      context: ..
      dockerfile: cybersecurity-governor/spine/reconciler/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@cg-postgres:5432/cybersecuritygovernor
      REDIS_URL: redis://cg-redis:6379/0
      RECONCILER_HEALTH_PORT: 8122
    ports:
      - "8122:8122"
    depends_on:
      cg-postgres:
        condition: service_healthy
      cg-sidecar:
        condition: service_started

  cg-gateway:
    build:
      context: ..
      dockerfile: cybersecurity-governor/spine/gateway/Dockerfile
    environment:
      CG_SIDECAR_URL: http://cg-sidecar:8121
      CG_INTERNAL_TOKEN: ${CG_INTERNAL_TOKENS:-dev-cg-spine-token-change-me}
    ports:
      - "8120:8120"
    depends_on:
      - cg-sidecar

  cg-egress-govern:
    build:
      context: ..
      dockerfile: cybersecurity-governor/platforms/egress_govern/Dockerfile
    environment:
      CG_SPINE_ENABLED: ${CG_SPINE_ENABLED:-true}
      CG_SIDECAR_URL: http://cg-sidecar:8121
      CG_INTERNAL_TOKEN: ${CG_INTERNAL_TOKENS:-dev-cg-spine-token-change-me}
    ports:
      - "8123:8123"
    depends_on:
      cg-sidecar:
        condition: service_started

  cg-identity-govern:
    build:
      context: ..
      dockerfile: cybersecurity-governor/platforms/identity_govern/Dockerfile
    environment:
      CG_SPINE_ENABLED: ${CG_SPINE_ENABLED:-true}
      CG_SIDECAR_URL: http://cg-sidecar:8121
      CG_INTERNAL_TOKEN: ${CG_INTERNAL_TOKENS:-dev-cg-spine-token-change-me}
    ports:
      - "8124:8124"
    depends_on:
      cg-sidecar:
        condition: service_started

  cg-threat-proxy:
    build:
      context: ..
      dockerfile: cybersecurity-governor/platforms/threat_proxy/Dockerfile
    environment:
      CG_SPINE_ENABLED: ${CG_SPINE_ENABLED:-true}
      CG_SIDECAR_URL: http://cg-sidecar:8121
      CG_INTERNAL_TOKEN: ${CG_INTERNAL_TOKENS:-dev-cg-spine-token-change-me}
    ports:
      - "8125:8125"
    depends_on:
      cg-sidecar:
        condition: service_started

  cg-incident-response-gate:
    build:
      context: ..
      dockerfile: cybersecurity-governor/platforms/incident_response_gate/Dockerfile
    environment:
      CG_SPINE_ENABLED: ${CG_SPINE_ENABLED:-true}
      CG_SIDECAR_URL: http://cg-sidecar:8121
      CG_INTERNAL_TOKEN: ${CG_INTERNAL_TOKENS:-dev-cg-spine-token-change-me}
    ports:
      - "8126:8126"
    depends_on:
      cg-sidecar:
        condition: service_started

  cg-posture-reconcile:
    build:
      context: ..
      dockerfile: cybersecurity-governor/platforms/posture_reconcile/Dockerfile
    environment:
      CG_SPINE_ENABLED: ${CG_SPINE_ENABLED:-true}
      CG_SIDECAR_URL: http://cg-sidecar:8121
      CG_INTERNAL_TOKEN: ${CG_INTERNAL_TOKENS:-dev-cg-spine-token-change-me}
    ports:
      - "8127:8127"
    depends_on:
      cg-sidecar:
        condition: service_started

  cg-compliance-logger:
    build:
      context: ..
      dockerfile: cybersecurity-governor/platforms/compliance_logger/Dockerfile
    environment:
      CG_SPINE_ENABLED: ${CG_SPINE_ENABLED:-true}
      CG_SIDECAR_URL: http://cg-sidecar:8121
      CG_INTERNAL_TOKEN: ${CG_INTERNAL_TOKENS:-dev-cg-spine-token-change-me}
    ports:
      - "8128:8128"
    depends_on:
      cg-sidecar:
        condition: service_started

  cg-witness-bridge:
    build:
      context: ..
      dockerfile: cybersecurity-governor/platforms/witness_bridge/Dockerfile
    environment:
      CG_SPINE_ENABLED: ${CG_SPINE_ENABLED:-true}
      CG_SIDECAR_URL: http://cg-sidecar:8121
      CG_INTERNAL_TOKEN: ${CG_INTERNAL_TOKENS:-dev-cg-spine-token-change-me}
    ports:
      - "8129:8129"
    depends_on:
      cg-sidecar:
        condition: service_started

  cg-lineage-ingest:
    build:
      context: ..
      dockerfile: cybersecurity-governor/platforms/lineage_ingest/Dockerfile
    environment:
      CG_SPINE_ENABLED: ${CG_SPINE_ENABLED:-true}
      CG_SIDECAR_URL: http://cg-sidecar:8121
      CG_INTERNAL_TOKEN: ${CG_INTERNAL_TOKENS:-dev-cg-spine-token-change-me}
    ports:
      - "8130:8130"
    depends_on:
      cg-sidecar:
        condition: service_started

  cg-content-guard:
    build:
      context: ..
      dockerfile: cybersecurity-governor/platforms/content_guard/Dockerfile
    environment:
      CG_SPINE_ENABLED: ${CG_SPINE_ENABLED:-true}
      CG_SIDECAR_URL: http://cg-sidecar:8121
      CG_INTERNAL_TOKEN: ${CG_INTERNAL_TOKENS:-dev-cg-spine-token-change-me}
    ports:
      - "8131:8131"
    depends_on:
      cg-sidecar:
        condition: service_started

volumes:
  cg_postgres_data:
