# Cybersecurity Governor HA rehearsal — spine only (PgBouncer + multi-reconciler)
#
# Usage:
#   docker compose -f cybersecurity-governor/docker-compose.ha.yml up -d --build \
#     --scale cg-sidecar=2 --scale cg-reconciler=2

services:
  cg-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cybersecuritygovernor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - cg_ha_postgres:/var/lib/postgresql/data
      - ./migrations/0001_cg_spine_init.sql:/docker-entrypoint-initdb.d/0001_init.sql:ro
      - ./migrations/0002_security_chain_anchors.sql:/docker-entrypoint-initdb.d/0002_anchors.sql:ro
      - ./migrations/0003_admin_audit_log.sql:/docker-entrypoint-initdb.d/0003_audit.sql:ro
      - ./migrations/0004_cg_platforms_mesh.sql:/docker-entrypoint-initdb.d/0004_mesh.sql:ro
      - ./migrations/0005_cg_production_state.sql:/docker-entrypoint-initdb.d/0005_state.sql:ro
      - ./migrations/0007_sales_sku_platforms.sql:/docker-entrypoint-initdb.d/0007_sales_skus.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cybersecuritygovernor"]
      interval: 3s
      retries: 10

  cg-pgbouncer:
    image: edoburu/pgbouncer:1.22.1-p0
    volumes:
      - ./config/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./config/pgbouncer-userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "6433:6432"
    depends_on:
      cg-postgres:
        condition: service_healthy

  cg-redis:
    image: redis:7
    ports:
      - "6382:6379"

  cg-sidecar:
    build:
      context: ..
      dockerfile: cybersecurity-governor/spine/sidecar/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@cg-pgbouncer:6432/cybersecuritygovernor
      REDIS_URL: redis://cg-redis:6379/0
      CG_INTERNAL_TOKENS: ${CG_INTERNAL_TOKENS:-dev-cg-spine-token-change-me}
    ports:
      - "8121:8121"
    depends_on:
      cg-pgbouncer:
        condition: service_started
      cg-redis:
        condition: service_started

  cg-reconciler:
    build:
      context: ..
      dockerfile: cybersecurity-governor/spine/reconciler/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@cg-pgbouncer:6432/cybersecuritygovernor
      REDIS_URL: redis://cg-redis:6379/0
      RECONCILER_HEALTH_PORT: 8122
    ports:
      - "8122:8122"
    depends_on:
      - cg-sidecar

  cg-gateway:
    build:
      context: ..
      dockerfile: cybersecurity-governor/spine/gateway/Dockerfile
    environment:
      CG_SIDECAR_URL: http://cg-sidecar:8121
      CG_INTERNAL_TOKEN: ${CG_INTERNAL_TOKENS:-dev-cg-spine-token-change-me}
    ports:
      - "8120:8120"
    depends_on:
      - cg-sidecar

volumes:
  cg_ha_postgres:
