# Sales-demo stack — full institutional++ topology, zero external dependencies.
# Mock provider routing, no API keys, no Istio, no cloud secrets required.
#
# Usage:
#   make demo-gold-up
#   make demo-gold

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-modelgovernor}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - demo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d modelgovernor"]
      interval: 3s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 12

  sidecar:
    build:
      context: .
      dockerfile: sidecar/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/modelgovernor
      REDIS_URL: redis://redis:6379/0
      SIDECAR_INTERNAL_TOKENS: ${SIDECAR_INTERNAL_TOKENS:-dev-sidecar-token}
      GUARDRAILS_ENABLED: "true"
      CIRCUIT_BREAKER_ENABLED: "true"
      PROVIDER_MODE: mock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8081/healthz')\""]
      interval: 5s
      timeout: 3s
      retries: 12

  reconciler:
    build:
      context: .
      dockerfile: reconciler/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/modelgovernor
      REDIS_URL: redis://redis:6379/0
      SIDECAR_INTERNAL_TOKENS: ${SIDECAR_INTERNAL_TOKENS:-dev-sidecar-token}
      RECONCILER_MODE: daemon
      SWEEP_INTERVAL_SECONDS: "30"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8082/healthz')\""]
      interval: 5s
      timeout: 3s
      retries: 12

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      SIDECAR_URL: http://sidecar:8081
      SIDECAR_INTERNAL_TOKEN: ${SIDECAR_PRIMARY_TOKEN:-dev-sidecar-token}
      PROVIDER_MODE: mock
      MOCK_DISPATCH_COST: "1.000000"
      OIDC_ENABLED: "false"
    depends_on:
      sidecar:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')\""]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  demo_postgres_data:
